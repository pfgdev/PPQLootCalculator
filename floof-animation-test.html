<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loot V2 Floof Animation Test</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef3fb;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #24385f;
    }

    .test-shell {
      width: min(720px, 94vw);
      padding: 20px;
      border: 1px solid #c6d7f2;
      border-radius: 14px;
      background: #f5f8ff;
      box-shadow: 0 6px 20px rgba(32, 54, 94, 0.08);
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    .test-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .replay-btn {
      border: 1px solid #7fa2d8;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 16px;
      font-weight: 700;
      color: #1e3b70;
      background: #dfeaff;
      cursor: pointer;
      transition: background 120ms ease;
    }

    .replay-btn:hover {
      background: #eaf2ff;
    }

    .loot-v2-floof-preview {
      margin-top: 10px;
      padding: 2px 0 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 4px;
      pointer-events: none;
      user-select: none;
      opacity: 0.96;
    }

    .loot-v2-floof-stage {
      position: relative;
      width: 256px;
      height: 256px;
      overflow: visible;
    }

    .loot-v2-floof-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transform-origin: 50% 66%;
      opacity: 0;
      will-change: transform, opacity;
    }

    .loot-v2-floof-frame-closed {
      z-index: 2;
    }

    .loot-v2-floof-frame-open {
      z-index: 3;
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .loot-v2-floof-frame-smoke {
      z-index: 4;
    }

    .loot-v2-floof-preview.is-idle-hop .loot-v2-floof-frame-open {
      animation: lootV2FloofOpenIdle 2600ms ease-in-out infinite;
    }

    .loot-v2-floof-caption {
      font-size: 11px;
      font-style: italic;
      font-weight: 700;
      color: #4d638a;
      letter-spacing: 0.01em;
    }

    .loot-v2-floof-preview.is-playing .loot-v2-floof-frame-closed {
      animation: lootV2FloofClosed 2200ms ease-in-out both;
    }

    .loot-v2-floof-preview.is-playing .loot-v2-floof-frame-smoke {
      animation: lootV2FloofSmoke 2200ms ease-out both;
    }

    .loot-v2-floof-preview.is-playing .loot-v2-floof-frame-open {
      animation: lootV2FloofOpen 2200ms ease-out both;
    }

    @keyframes lootV2FloofClosed {
      0% {
        opacity: 1;
        transform: translateY(0) rotate(0deg) scale(1);
      }
      8% {
        transform: translateY(0) rotate(0deg) scale(1);
      }
      12% {
        transform: translateY(-3px) rotate(-2deg) scale(1.01);
      }
      16% {
        transform: translateY(2px) rotate(2deg) scale(0.99);
      }
      20% {
        transform: translateY(0) rotate(0deg) scale(1);
      }
      30% {
        transform: translateY(0) rotate(0deg) scale(1);
      }
      34% {
        transform: translateY(-4px) rotate(2.5deg) scale(1.01);
      }
      39% {
        transform: translateY(3px) rotate(-2.5deg) scale(0.99);
      }
      44% {
        transform: translateY(0) rotate(0deg) scale(1);
      }
      52% {
        transform: translateY(0) rotate(0deg) scale(1);
      }
      56% {
        transform: translateY(-2px) rotate(-1.5deg) scale(1.005);
      }
      61% {
        transform: translateY(1px) rotate(1.5deg) scale(0.995);
      }
      66% {
        opacity: 1;
        transform: translateY(0) rotate(0deg) scale(1);
      }
      74% {
        opacity: 0;
        transform: translateY(2px) rotate(0deg) scale(0.96);
      }
      100% {
        opacity: 0;
        transform: translateY(2px) rotate(0deg) scale(0.96);
      }
    }

    @keyframes lootV2FloofSmoke {
      0% {
        opacity: 0;
        transform: translateY(8px) scale(0.66);
      }
      60% {
        opacity: 0;
        transform: translateY(8px) scale(0.66);
      }
      68% {
        opacity: 0.95;
        transform: translateY(0) scale(1.05);
      }
      78% {
        opacity: 0.78;
        transform: translateY(-6px) scale(1.22);
      }
      92% {
        opacity: 0.22;
        transform: translateY(-12px) scale(1.42);
      }
      100% {
        opacity: 0;
        transform: translateY(-14px) scale(1.52);
      }
    }

    @keyframes lootV2FloofOpen {
      0% {
        opacity: 0;
        transform: translateY(8px) scale(0.9);
      }
      66% {
        opacity: 0;
        transform: translateY(8px) scale(0.9);
      }
      74% {
        opacity: 1;
        transform: translateY(-8px) scale(1.05);
      }
      82% {
        transform: translateY(2px) scale(0.99);
      }
      90% {
        transform: translateY(-4px) scale(1.02);
      }
      96% {
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes lootV2FloofOpenIdle {
      0% {
        transform: translateY(0) scale(1);
      }
      18% {
        transform: translateY(-3px) scale(1.01);
      }
      30% {
        transform: translateY(0) scale(1);
      }
      62% {
        transform: translateY(0) scale(1);
      }
      76% {
        transform: translateY(-4px) scale(1.01);
      }
      88% {
        transform: translateY(0) scale(1);
      }
      100% {
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="test-shell">
    <div id="lootV2FloofPreview" class="loot-v2-floof-preview is-idle-hop" aria-hidden="true">
      <div class="loot-v2-floof-stage">
        <img class="loot-v2-floof-frame loot-v2-floof-frame-closed" src="https://i.ibb.co/yBPsqVBG/flooftreasure0.png" alt="">
        <img class="loot-v2-floof-frame loot-v2-floof-frame-smoke" src="https://i.ibb.co/qLpjR4x7/flooftreasure05.png" alt="">
        <img class="loot-v2-floof-frame loot-v2-floof-frame-open" src="https://i.ibb.co/tpXby3hw/flooftreasure1.png" alt="">
      </div>
      <div class="loot-v2-floof-caption">Floof found treasure.</div>
    </div>
    <div class="test-actions">
      <button class="replay-btn" id="replayButton" type="button">Replay</button>
    </div>
  </div>

  <script>
    (function () {
      const previewNode = document.getElementById("lootV2FloofPreview");
      const replayButton = document.getElementById("replayButton");
      let previewTimer = null;

      function clearAnimation() {
        if (previewTimer) {
          clearTimeout(previewTimer);
          previewTimer = null;
        }
        previewNode.classList.remove("is-playing");
        previewNode.classList.remove("is-idle-hop");
      }

      function replay() {
        clearAnimation();
        void previewNode.offsetWidth;
        previewNode.classList.add("is-playing");
        previewTimer = setTimeout(function () {
          previewNode.classList.remove("is-playing");
          previewNode.classList.add("is-idle-hop");
          previewTimer = null;
        }, 2240);
      }

      replayButton.addEventListener("click", replay);
    })();
  </script>
</body>
</html>
