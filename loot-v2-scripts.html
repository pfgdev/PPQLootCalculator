      prompt.value = "";
      prompt.textContent = "Select Chest to delete";
      deleteChestSelectNode.appendChild(prompt);

      chestList.forEach(function (chest) {
        const option = document.createElement("option");
        option.value = chest.chest_id;
        option.textContent = chest.chest_name;
        deleteChestSelectNode.appendChild(option);
      });

      if (previous && chestList.some(function (chest) { return chest.chest_id === previous; })) {
        deleteChestSelectNode.value = previous;
      } else {
        deleteChestSelectNode.value = "";
      }
      deleteChestSelectNode.disabled = false;
      if (deleteChestButtonNode) {
        deleteChestButtonNode.disabled = false;
      }
    }

    function renderChestToolsState() {
      if (!deleteChestButtonNode || !deleteChestSelectNode) return;
      const lockActions = isBootstrapping;
      const nextChestName = normalizeWhitespace(newChestNameNode && newChestNameNode.value);
      if (addChestButtonNode) {
        addChestButtonNode.disabled = lockActions || !nextChestName;
        addChestButtonNode.title = nextChestName ? "" : "Name required";
      }
      const selectedDeleteId = deleteChestSelectNode.value || "";
      const armed = !!pendingDeleteChestId && pendingDeleteChestId === selectedDeleteId;
      deleteChestButtonNode.disabled = lockActions || (!selectedDeleteId && !armed);
      deleteChestButtonNode.title = selectedDeleteId ? "" : "Select Chest to delete";
      deleteChestButtonNode.textContent = armed ? "Confirm" : "Delete Chest";
      if (newChestNameNode) newChestNameNode.disabled = lockActions;
      deleteChestSelectNode.disabled = lockActions || !chestList.length;
    }

    function clearDeleteConfirmState() {
      if (!pendingDeleteChestId) return;
      pendingDeleteChestId = "";
      renderChestToolsState();
    }

    function getGroupSummaries() {
      if (!hasSelectedChest()) return [];
      const map = {};
      getActiveItems(selectedChestId).forEach(function (item) {
        const parts = parseTokenParts(item.token);
        const name = normalizeWhitespace(parts.prefix);
        if (!name) return;
        const key = normalizePrefixKey(name);
        if (!map[key]) {
          map[key] = {
            key: key,
            name: name,
            theme: resolveThemeValue(item.color_theme) || inferThemeFromTokenPrefix(name) || COLOR_THEMES[0].value,
            count: 0
          };
        }
        map[key].count += 1;
        const nextTheme = resolveThemeValue(item.color_theme);
        if (nextTheme) {
          map[key].theme = nextTheme;
        }
      });
      return Object.keys(map).map(function (key) { return map[key]; }).sort(function (a, b) {
        return a.name.localeCompare(b.name, undefined, { sensitivity: "base" });
      });
    }

    function getGroupByName(name) {
      const key = normalizePrefixKey(name);
      return getGroupSummaries().find(function (summary) {
        return normalizePrefixKey(summary.name) === key;
      }) || null;
    }

    function getCreateGroupCountValue() {
      const raw = normalizeWhitespace(createGroupCountNode && createGroupCountNode.value);
      const parsed = Number(raw);
      if (!Number.isInteger(parsed)) return GROUP_COUNT_LIMITS.min;
      return clampNumber(parsed, GROUP_COUNT_LIMITS.min, GROUP_COUNT_LIMITS.max);
    }

    function setCreateGroupCountValue(value) {
      if (!createGroupCountNode) return;
      createGroupCountNode.value = String(clampNumber(value, GROUP_COUNT_LIMITS.min, GROUP_COUNT_LIMITS.max));
    }

    function adjustCreateGroupCount(delta) {
      if (!createGroupCountNode || createGroupCountNode.disabled) return;
      const next = getCreateGroupCountValue() + delta;
      setCreateGroupCountValue(next);
      renderGroupEditorState();
    }

    function clearGroupCountRepeatTimers() {
      if (groupCountRepeatDelayTimer) {
        clearTimeout(groupCountRepeatDelayTimer);
        groupCountRepeatDelayTimer = null;
      }
      if (groupCountRepeatIntervalTimer) {
        clearInterval(groupCountRepeatIntervalTimer);
        groupCountRepeatIntervalTimer = null;
      }
    }

    function handleGroupCountPointerDown(event) {
      const button = event.target.closest("button[data-action]");
      if (!button || !root.contains(button)) return;
      const action = button.getAttribute("data-action");
      if (!GROUP_COUNT_REPEATABLE_ACTIONS.has(action)) return;

      clearGroupCountRepeatTimers();
      groupCountRepeatDelayTimer = setTimeout(function () {
        groupCountRepeatIntervalTimer = setInterval(function () {
          adjustCreateGroupCount(action === "group-count-inc" ? 1 : -1);
        }, 75);
      }, 280);
    }

    function renderGroupEditorState() {
      const noChest = !hasSelectedChest() || isBootstrapping;
      const summaries = getGroupSummaries();
      const hasGroups = summaries.length > 0;
      if (!hasGroups && activeManageTab === "group-manage") {
        activeManageTab = "group-create";
        renderManageTabState();
      }

      if (createGroupThemeNode) {
        createGroupThemeNode.disabled = noChest;
      }
      if (createGroupNameNode) {
        createGroupNameNode.disabled = noChest;
      }
      if (createGroupCountNode) {
        createGroupCountNode.disabled = noChest;
      }
      root.querySelectorAll('[data-action="group-count-dec"], [data-action="group-count-inc"]').forEach(function (button) {
        button.disabled = noChest;
      });

      const createName = normalizeWhitespace(createGroupNameNode && createGroupNameNode.value);
      const createCount = Number(normalizeWhitespace(createGroupCountNode && createGroupCountNode.value));
      const hasValidCreateCount = Number.isInteger(createCount)
        && createCount >= GROUP_COUNT_LIMITS.min
        && createCount <= GROUP_COUNT_LIMITS.max;
      const createTheme = resolveThemeValue(createGroupThemeNode && createGroupThemeNode.value);
      const hasGroupNameConflict = summaries.some(function (summary) {
        return normalizePrefixKey(summary.name) === normalizePrefixKey(createName);
      });
      let addGroupDisableReason = "";
      if (noChest) {
        addGroupDisableReason = "Create a chest first";
      } else if (!createName) {
        addGroupDisableReason = "Name required";
      } else if (!createTheme) {
        addGroupDisableReason = "Theme required";
      } else if (hasGroupNameConflict) {
        addGroupDisableReason = "Name already exists";
      } else if (!Number.isInteger(createCount)) {
        addGroupDisableReason = "Tokens must be a whole number";
      } else if (createCount < GROUP_COUNT_LIMITS.min || createCount > GROUP_COUNT_LIMITS.max) {
        addGroupDisableReason = "Tokens must be 1-999";
      }

      if (addGroupButtonNode) {
        addGroupButtonNode.disabled = !hasValidCreateCount || !!addGroupDisableReason;
        addGroupButtonNode.title = addGroupDisableReason;
      }

      if (manageGroupSelectNode) {
        const previous = manageGroupSelectNode.value;
        clearNode(manageGroupSelectNode);
        if (!hasGroups) {
          const empty = document.createElement("option");
          empty.value = "";
          empty.textContent = "No groups available";
          manageGroupSelectNode.appendChild(empty);
          manageGroupSelectNode.value = "";
          manageGroupSelectNode.disabled = true;
        } else {
          const prompt = document.createElement("option");
          prompt.value = "";
          prompt.textContent = "Select group...";
          manageGroupSelectNode.appendChild(prompt);
          summaries.forEach(function (summary) {
            const option = document.createElement("option");
            option.value = summary.name;
            option.textContent = summary.name;
            manageGroupSelectNode.appendChild(option);
          });
          const hasPrevious = summaries.some(function (summary) { return summary.name === previous; });
          manageGroupSelectNode.value = hasPrevious ? previous : "";
          manageGroupSelectNode.disabled = noChest;
        }
      }

      const selected = manageGroupSelectNode ? getGroupByName(manageGroupSelectNode.value) : null;
      if (manageGroupNameNode) {
        const selectedSource = selected ? selected.name : "";
        const sourceChanged = manageGroupNameNode.dataset.groupSource !== selectedSource;
        if (selected && sourceChanged) {
          manageGroupNameNode.value = "";
          manageGroupNameNode.dataset.groupSource = selectedSource;
          manageGroupNameNode.dataset.userEdited = "";
        } else if (!selected) {
          manageGroupNameNode.value = "";
          delete manageGroupNameNode.dataset.groupSource;
          manageGroupNameNode.dataset.userEdited = "";
        }
        manageGroupNameNode.disabled = noChest || !selected;
      }

      if (manageGroupThemeNode) {
        const selectedSource = selected ? selected.name : "";
        const sourceChanged = manageGroupThemeNode.dataset.groupSource !== selectedSource;
        if (selected && sourceChanged) {
          manageGroupThemeNode.value = "";
          manageGroupThemeNode.dataset.groupSource = selectedSource;
          manageGroupThemeNode.dataset.userEdited = "";
        } else if (!selected) {
          manageGroupThemeNode.value = "";
          delete manageGroupThemeNode.dataset.groupSource;
          manageGroupThemeNode.dataset.userEdited = "";
        }
        manageGroupThemeNode.disabled = noChest || !selected;
      }

      const nextName = normalizeWhitespace(manageGroupNameNode && manageGroupNameNode.value);
      const nextTheme = resolveThemeValue(manageGroupThemeNode && manageGroupThemeNode.value);
      const hasRenameConflict = !!selected && summaries.some(function (summary) {
        return normalizePrefixKey(summary.name) === normalizePrefixKey(nextName)
          && normalizePrefixKey(summary.name) !== normalizePrefixKey(selected.name);
      });
      const isThemeChanged = !!selected && !!nextTheme && resolveThemeValue(selected.theme) !== nextTheme;
      const isNameChanged = !!selected && normalizePrefixKey(selected.name) !== normalizePrefixKey(nextName);
      const canUpdate = !!selected && !!nextName && !!nextTheme && !hasRenameConflict && (isNameChanged || isThemeChanged);
      let updateDisableReason = "";
      if (noChest) {
        updateDisableReason = "Create a chest first";
      } else if (!selected) {
        updateDisableReason = "Select group";
      } else if (!nextName) {
        updateDisableReason = "Name required";
      } else if (!nextTheme) {
        updateDisableReason = "Select new theme";
      } else if (hasRenameConflict) {
        updateDisableReason = "Name already exists";
      } else if (!canUpdate) {
        updateDisableReason = "No changes to update";
      }

      if (updateGroupButtonNode) {
        updateGroupButtonNode.disabled = noChest || !canUpdate;
        updateGroupButtonNode.title = updateGroupButtonNode.disabled ? updateDisableReason : "";
      }

      const armedDelete = !!selected
        && !!pendingDeleteGroupPrefix
        && normalizePrefixKey(pendingDeleteGroupPrefix) === normalizePrefixKey(selected.name);
      if (deleteGroupButtonNode) {
        deleteGroupButtonNode.textContent = armedDelete ? "Confirm" : "Delete";
        deleteGroupButtonNode.disabled = noChest || !selected;
        deleteGroupButtonNode.title = (noChest || !selected) ? "Select group" : "";
      }
    }

    function clearDeleteGroupConfirmState() {
      if (!pendingDeleteGroupPrefix) return;
      pendingDeleteGroupPrefix = "";
      renderGroupEditorState();
    }

    function renderColorOptions() {
      if (createGroupThemeNode) clearNode(createGroupThemeNode);
      if (manageGroupThemeNode) clearNode(manageGroupThemeNode);
      if (createGroupThemeNode) {
        const createPrompt = document.createElement("option");
        createPrompt.value = "";
        createPrompt.textContent = "Select theme...";
        createGroupThemeNode.appendChild(createPrompt);
      }
      if (manageGroupThemeNode) {
        const managePrompt = document.createElement("option");
        managePrompt.value = "";
        managePrompt.textContent = "Select new theme...";
        manageGroupThemeNode.appendChild(managePrompt);
      }
      COLOR_THEMES.forEach(function (theme) {
        const option = document.createElement("option");
        option.value = theme.value;
        option.textContent = theme.label;
        if (createGroupThemeNode) {
          createGroupThemeNode.appendChild(option.cloneNode(true));
        }
        if (manageGroupThemeNode) {
          manageGroupThemeNode.appendChild(option.cloneNode(true));
        }
      });
      if (createGroupThemeNode) createGroupThemeNode.value = "";
      if (manageGroupThemeNode) manageGroupThemeNode.value = "";
    }

    function renderListStatusFilters() {
      if (!listFilterButtonNodes) return;
      const noChest = !hasSelectedChest();
      listFilterButtonNodes.forEach(function (button) {
        const status = button.getAttribute("data-status");
        const isActive = activeListStatusFilters.has(status);
        const count = statusCounts[status] || 0;
        button.disabled = noChest || isBootstrapping;
        clearNode(button);
        const labelNode = document.createElement("span");
        labelNode.className = "loot-v2-list-filter-label";
        labelNode.textContent = toDisplayStatus(status) + " (" + String(count) + ")";
        button.appendChild(labelNode);
        button.classList.toggle("is-active", isActive);
      });
    }

    function renderEditFirstToggle() {
      if (!editFirstToggleButtonNode) return;
      editFirstToggleButtonNode.classList.toggle("is-active", isEditFirstMode);
      editFirstToggleButtonNode.setAttribute("aria-pressed", isEditFirstMode ? "true" : "false");
      editFirstToggleButtonNode.textContent = isEditFirstMode ? "Edit First On" : "Edit First Off";
      editFirstToggleButtonNode.title = isEditFirstMode
        ? "Item clicks open in edit mode"
        : "Item clicks open in read mode";
      editFirstToggleButtonNode.disabled = isBootstrapping;
    }

    function toggleEditFirstMode() {
      isEditFirstMode = !isEditFirstMode;
      renderEditFirstToggle();
    }

    function renderAll() {
      ensureSelection();
      pruneDeferredStatusState();
      if (!hasSelectedChest()) {
        activeManageTab = "chest";
      }
      const hasDetail = !!getItemById(selectedItemId);
      root.classList.add("loot-v2-manage-mode");
      root.classList.toggle("loot-v2-has-detail", hasDetail);
      if (tableToolsCardNode) {
        tableToolsCardNode.hidden = false;
      }
      renderManageTabState();
      updateMetrics();
      renderChestSelect();
      renderDeleteChestSelect();
      renderChestToolsState();
      renderGroupEditorState();
      renderTokenRangeState();
      const noChest = !hasSelectedChest();
      if (searchInputNode) searchInputNode.disabled = noChest || isBootstrapping;
      renderEditFirstToggle();
      renderListStatusFilters();
      renderUndoActionState();
      renderTable();
      renderDetail();
      renderBackupsModalState();
      updateDirtyState();
      root.classList.toggle("is-syncing", isSyncing);
      if (syncLaneNode) {
        syncLaneNode.hidden = true;
      }
    }

    function setHistoryState(message, toneClass) {
      if (!historyStateNode) return;
      const safeMessage = normalizeWhitespace(message) || "No changes made.";
      historyStateNode.textContent = "";
      const prefixMatch = safeMessage.match(/^([^:]{1,24}:\s*)(.*)$/);
      if (prefixMatch) {
        const prefixNode = document.createElement("span");
        prefixNode.className = "loot-v2-history-prefix";
        prefixNode.textContent = prefixMatch[1].replace(/:\s*$/, ": ");
        historyStateNode.appendChild(prefixNode);
        historyStateNode.appendChild(document.createTextNode(prefixMatch[2] || ""));
      } else {
        historyStateNode.textContent = safeMessage;
      }
      historyStateNode.classList.remove("is-idle", "is-info", "is-success", "is-warn");
      historyStateNode.classList.add(toneClass || "is-idle");
    }

    function clearUndoHistoryState() {
      lastChangeState = null;
      setHistoryState("No changes made.", "is-idle");
    }

    function setNonUndoableAction(message) {
      const shortMessage = normalizeWhitespace(message) || "Action";
      lastChangeState = {
        kind: "non-undoable",
        can_toggle: false,
        message: shortMessage
      };
      setHistoryState("Can't Undo: " + shortMessage, "is-warn");
    }

    function setSyncState(nextState, errorText) {
      syncState = nextState || "saved";
      syncErrorText = errorText || "";
    }

    function persistSnapshot(snapshot) {
      const safeSnapshot = snapshot && typeof snapshot === "object" ? snapshot : buildWorkingSnapshot();
      persistedChestList = deepClone(Array.isArray(safeSnapshot.chests) ? safeSnapshot.chests : []);
      persistedItemsByChest = deepClone(
        safeSnapshot.itemsByChest && typeof safeSnapshot.itemsByChest === "object"
          ? safeSnapshot.itemsByChest
          : {}
      );
      if (dataSourceMode === "local" || !sheetsModeEnabled) {
        writeLocalModeSnapshot(buildLocalModeSnapshotForStorage());
      }
    }

    function persistWorkingSnapshot() {
      persistSnapshot(buildWorkingSnapshot());
    }

    function resetPendingOperations() {
      pendingTokenUpserts.clear();
      pendingTokenDeletes.clear();
      pendingDeleteChestOps.clear();
      pendingForceSnapshotSave = false;
    }

    function buildTokenOperationPayload(item) {
      if (!item || !item.item_id) return null;
      const chest = chestList.find(function (entry) {
        return entry && entry.chest_id === item.chest_id;
      }) || null;
      const tokenParts = parseTokenParts(item.token || "");
      return {
        token_id: String(item.item_id || ""),
        chest_id: String(item.chest_id || ""),
        chest_name: normalizeWhitespace(chest && chest.chest_name ? chest.chest_name : item.chest_name || item.chest_id),
        token_label: normalizeWhitespace(item.token),
        token_number: Number.isFinite(tokenParts.number) ? Number(tokenParts.number) : 0,
        group_name: normalizeWhitespace(item.category_label || tokenParts.prefix),
        theme_key: resolveThemeValue(item.color_theme || ""),
        status: item.status || STATUS.UNUSED,
        item_name: normalizeWhitespace(item.item_name),
        rarity: normalizeWhitespace(item.rarity),
        type: normalizeWhitespace(item.type),
        description: normalizeMultilineText(item.description),
        item_link: normalizeWhitespace(item.item_url),
        notes: normalizeMultilineText(item.notes)
      };
    }

    function queueTokenUpsert(item) {
      const payload = buildTokenOperationPayload(item);
      if (!payload || !payload.token_id) return;
      pendingTokenDeletes.delete(payload.token_id);
      pendingTokenUpserts.set(payload.token_id, payload);
    }

    function queueTokenDelete(itemId) {
      const tokenId = normalizeWhitespace(itemId);
      if (!tokenId) return;
      pendingTokenUpserts.delete(tokenId);
      pendingTokenDeletes.add(tokenId);
    }

    function queueDeleteChest(chestId) {
      const tokenId = normalizeWhitespace(chestId);
      if (!tokenId) return;
      pendingDeleteChestOps.add(tokenId);
      pendingTokenDeletes.forEach(function (candidateId) {
        const item = getItemById(candidateId);
        if (item && item.chest_id === tokenId) {
          pendingTokenDeletes.delete(candidateId);
        }
      });
      pendingTokenUpserts.forEach(function (payload, candidateId) {
        if (payload && payload.chest_id === tokenId) {
          pendingTokenUpserts.delete(candidateId);
        }
      });
    }

    function queueForceSnapshotWrite() {
      pendingForceSnapshotSave = true;
      pendingTokenUpserts.clear();
      pendingTokenDeletes.clear();
      pendingDeleteChestOps.clear();
    }

    function buildOperationsPayload() {
      const operations = [];
      pendingDeleteChestOps.forEach(function (chestId) {
        operations.push({ type: "delete_chest", chest_id: chestId });
      });
      pendingTokenDeletes.forEach(function (tokenId) {
        operations.push({ type: "delete_token", token_id: tokenId });
      });
      pendingTokenUpserts.forEach(function (tokenPayload) {
        operations.push({ type: "upsert_token", token: deepClone(tokenPayload) });
      });
      return {
        chests: deepClone(chestList),
        operations: operations,
        data_version: String(lastServerDataVersion || "0")
      };
    }

    function clearAutoSaveTimer() {
      if (!autoSaveTimer) return;
      clearTimeout(autoSaveTimer);
      autoSaveTimer = null;
    }

    function clearAutoSaveMaxWaitTimer() {
      if (!autoSaveMaxWaitTimer) return;
      clearTimeout(autoSaveMaxWaitTimer);
      autoSaveMaxWaitTimer = null;
    }

    function resetAutoSaveWindow() {
      autoSaveWindowStartedAt = 0;
      clearAutoSaveMaxWaitTimer();
    }

    function armAutoSaveMaxWaitWindow() {
      if (autoSaveWindowStartedAt) return;
      autoSaveWindowStartedAt = Date.now();
      clearAutoSaveMaxWaitTimer();
      autoSaveMaxWaitTimer = setTimeout(function () {
        autoSaveMaxWaitTimer = null;
        performAutoSave();
      }, AUTO_SAVE_MAX_WAIT_MS);
    }

    function clearSyncRetryTimer() {
      if (!syncRetryTimer) return;
      clearTimeout(syncRetryTimer);
      syncRetryTimer = null;
    }

    function resetSyncRetryState() {
      clearSyncRetryTimer();
      syncRetryAttempt = 0;
    }

    function getSyncRetryDelayMs() {
      const index = Math.min(syncRetryAttempt, SYNC_RETRY_BACKOFF_MS.length - 1);
      return SYNC_RETRY_BACKOFF_MS[index];
    }

    function scheduleSyncRetry() {
      if (syncRetryTimer || !sheetsModeEnabled) return;
      if (!isDirty()) return;
      const delay = getSyncRetryDelayMs();
      syncRetryAttempt += 1;
      syncRetryTimer = setTimeout(function () {
        syncRetryTimer = null;
        if (!sheetsModeEnabled) {
          resetSyncRetryState();
          return;
        }
        if (!isDirty()) {
          resetSyncRetryState();
          setSyncState("saved");
          renderAllPreservingScroll();
          return;
        }
        retrySyncNow(true);
      }, delay);
    }

    function performAutoSave() {
      clearAutoSaveTimer();
      resetAutoSaveWindow();
      if (isSyncing) {
        savePendingWhileSync = true;
        return;
      }
      if (!isDirty()) {
        resetPendingOperations();
        resetSyncRetryState();
        savePendingWhileSync = false;
        setSyncState("saved");
        renderAllPreservingScroll();
        return;
      }
      isSyncing = true;
      savePendingWhileSync = false;
      setSyncState("saving");
      renderAllPreservingScroll();

      const finalizeSuccess = function (saveData) {
        resetSyncRetryState();
        versionConflictRetryCount = 0;
        persistSnapshot(payload);
        resetPendingOperations();
        if (saveData && saveData.data_version != null) {
          lastServerDataVersion = String(saveData.data_version);
        }
        isSyncing = false;
        if (savePendingWhileSync || isDirty()) {
          savePendingWhileSync = false;
          performAutoSave();
          return;
        }
        setSyncState("saved");
        renderAllPreservingScroll();
      };

      const finalizeFailure = function (message, options) {
        const settings = options && typeof options === "object" ? options : {};
        versionConflictRetryCount = 0;
        isSyncing = false;
        savePendingWhileSync = false;
        setSyncState("retry", normalizeWhitespace(message) || "Sync failed.");
        renderAllPreservingScroll();
        if (settings.autoRetry !== false) {
          scheduleSyncRetry();
        }
      };

      const payload = deepClone(buildWorkingSnapshot());
      const runner = getAppsScriptRunner();
      if (sheetsModeEnabled && runner) {
        const onSuccess = function (response) {
          const envelope = unwrapServerEnvelope(response);
          if (!envelope.ok) {
            const errorMessage = envelope.error || "Sync failed.";
            const errorText = String(errorMessage || "");
            const serverVersion = envelope.data && envelope.data.server_data_version != null
              ? String(envelope.data.server_data_version)
              : "";
            if (/version conflict/i.test(errorText) || (envelope.data && envelope.data.code === "VERSION_CONFLICT")) {
              if (serverVersion) {
                lastServerDataVersion = serverVersion;
              }
              isSyncing = false;
              savePendingWhileSync = false;
              versionConflictRetryCount += 1;
              if (versionConflictRetryCount > VERSION_CONFLICT_RETRY_LIMIT) {
                versionConflictRetryCount = 0;
                setSyncState("retry", "Sync retry limit reached. Try again.");
                renderAllPreservingScroll();
                return;
              }
              setSyncState("saving");
              renderAllPreservingScroll();
              scheduleAutoSave(80);
              return;
            }
            finalizeFailure(errorMessage);
            return;
          }
          finalizeSuccess(envelope.data || {});
        };
        const onFailure = function (error) {
          finalizeFailure(getErrorMessage(error, "Sync failed."));
        };
        runner
          .withSuccessHandler(onSuccess)
          .withFailureHandler(onFailure)
          .lootSaveSnapshot(payload);
        return;
      }

      setTimeout(function () {
        finalizeSuccess({ mode: dataSourceMode, data_version: lastServerDataVersion });
      }, 280);
    }

    function scheduleAutoSave(delayMs) {
      const delay = Number.isFinite(Number(delayMs)) ? Number(delayMs) : 420;
      if (!isDirty()) {
        clearAutoSaveTimer();
        resetAutoSaveWindow();
        resetSyncRetryState();
        if (!isSyncing) {
          savePendingWhileSync = false;
        }
        setSyncState("saved");
        renderAllPreservingScroll();
        return;
      }
      if (isSyncing) {
        savePendingWhileSync = true;
        setSyncState("saving");
        renderAllPreservingScroll();
        return;
      }
      clearSyncRetryTimer();
      setSyncState("saving");
      renderAllPreservingScroll();
      armAutoSaveMaxWaitWindow();
      clearAutoSaveTimer();
      autoSaveTimer = setTimeout(performAutoSave, delay);
    }

    function retrySyncNow(isAutoRetry) {
      if (isAutoRetry !== true) {
        resetSyncRetryState();
      }
      if (isDirty() || sheetsModeEnabled) {
        performAutoSave();
        return;
      }
      loadInitialStateFromDataSource();
    }

    function getDraftSnapshotFromFields() {
      if (!isDetailEditing) return null;
      return {
        item_name: normalizeWhitespace(editItemNameNode && editItemNameNode.value),
        rarity: normalizeWhitespace(editRarityNode && editRarityNode.value),
        type: normalizeWhitespace(editTypeNode && editTypeNode.value),
        description: normalizeMultilineText(editDescriptionNode && editDescriptionNode.value),
        item_url: normalizeWhitespace(editItemUrlNode && editItemUrlNode.value),
        notes: normalizeMultilineText(editNotesNode && editNotesNode.value)
      };
    }

    function isDetailDraftDirty() {
      if (!isDetailEditing || !detailDraftInitial) return false;
      const current = getDraftSnapshotFromFields();
      return JSON.stringify(current) !== JSON.stringify(detailDraftInitial);
    }

    function ensureEditGuardResolved() {
      if (!isDetailEditing || !isDetailDraftDirty()) return true;
      // Auto-save dirty edits and continue the requested action without interrupting the flow.
      saveSelectedItem();
      return true;
    }

    function hasCheckpoint() {
      if (!manualCheckpoint) return false;
      if (manualCheckpoint.backupId) return true;
      return !!(manualCheckpoint.itemsByChest && manualCheckpoint.chests);
    }

    function formatCheckpointSummary() {
      if (checkpointStatusText) return checkpointStatusText;
      if (!hasCheckpoint()) return "No backup saved.";
      const savedAt = manualCheckpoint.savedAt ? new Date(manualCheckpoint.savedAt) : null;
      if (!savedAt || Number.isNaN(savedAt.getTime())) return "Backup saved.";
      return "Backup saved: " + savedAt.toLocaleString();
    }

    function clearRestoreCheckpointConfirmState() {
      restoreCheckpointConfirmArmed = false;
      if (restoreCheckpointConfirmTimer) {
        clearTimeout(restoreCheckpointConfirmTimer);
        restoreCheckpointConfirmTimer = null;
      }
    }

    function armRestoreCheckpointConfirmState() {
      clearRestoreCheckpointConfirmState();
      restoreCheckpointConfirmArmed = true;
      restoreCheckpointConfirmTimer = setTimeout(function () {
        clearRestoreCheckpointConfirmState();
        renderBackupsModalState();
      }, RESTORE_CONFIRM_ARM_MS);
    }

    function renderBackupsModalState() {
      if (!backupsSummaryNode) return;
      backupsSummaryNode.textContent = formatCheckpointSummary();
      if (restoreCheckpointButtonNode) {
        if (!hasCheckpoint() || !hasSelectedChest() || isCheckpointLoading || checkpointActionInFlight) {
          clearRestoreCheckpointConfirmState();
        }
        restoreCheckpointButtonNode.textContent = restoreCheckpointConfirmArmed ? "Confirm Restore" : "Restore Backup";
        restoreCheckpointButtonNode.title = restoreCheckpointConfirmArmed
          ? "Click again to confirm restore."
          : "Restore the latest backup.";
        restoreCheckpointButtonNode.disabled = !hasCheckpoint() || !hasSelectedChest() || isCheckpointLoading || checkpointActionInFlight;
      }
      if (saveCheckpointButtonNode) {
        saveCheckpointButtonNode.disabled = !hasSelectedChest() || isCheckpointLoading || checkpointActionInFlight;
      }
    }

    function setManualCheckpointFromServer(checkpoint, snapshotOverride) {
      if (!checkpoint || typeof checkpoint !== "object") {
        manualCheckpoint = null;
        clearRestoreCheckpointConfirmState();
        return;
      }
      const savedAtSource = normalizeWhitespace(checkpoint.created_at) || normalizeWhitespace(checkpoint.saved_at);
      let savedAt = savedAtSource;
      if (!savedAt) {
        savedAt = Date.now();
      }
      manualCheckpoint = {
        backupId: normalizeWhitespace(checkpoint.backup_id),
        label: normalizeWhitespace(checkpoint.label),
        chest_id: normalizeWhitespace(checkpoint.chest_id),
        savedAt: savedAt,
        createdBy: normalizeWhitespace(checkpoint.created_by),
        chests: snapshotOverride && Array.isArray(snapshotOverride.chests) ? deepClone(snapshotOverride.chests) : null,
        itemsByChest: snapshotOverride && snapshotOverride.itemsByChest ? deepClone(snapshotOverride.itemsByChest) : null,
        source: "sheets"
      };
      clearRestoreCheckpointConfirmState();
    }

    function refreshCheckpointFromServer() {
      const runner = getAppsScriptRunner();
      if (!sheetsModeEnabled || !runner) return;
      isCheckpointLoading = true;
      checkpointStatusText = "Checking Google Drive for a backup...";
      renderBackupsModalState();
      runner
        .withSuccessHandler(function (response) {
          const envelope = unwrapServerEnvelope(response);
          isCheckpointLoading = false;
          if (!envelope.ok) {
            checkpointStatusText = envelope.error || "Unable to check for backup.";
            renderBackupsModalState();
            return;
          }
          setManualCheckpointFromServer(envelope.data && envelope.data.checkpoint ? envelope.data.checkpoint : null, null);
          checkpointStatusText = "";
          renderBackupsModalState();
        })
        .withFailureHandler(function (error) {
          isCheckpointLoading = false;
          checkpointStatusText = getErrorMessage(error, "Unable to check for backup.");
          renderBackupsModalState();
        })
        .lootGetLatestCheckpoint();
    }

    function openBackupsModal() {
      if (!backupsModalNode || !hasSelectedChest()) return;
      clearRestoreCheckpointConfirmState();
      if (sheetsModeEnabled) {
        isCheckpointLoading = true;
        checkpointStatusText = "Checking Google Drive for a backup...";
      }
      renderBackupsModalState();
      modalLastFocusNode = (document.activeElement instanceof HTMLElement) ? document.activeElement : null;
      backupsModalNode.hidden = false;
      if (sheetsModeEnabled) {
        refreshCheckpointFromServer();
      }
      const focusTarget = saveCheckpointButtonNode || backupsHeaderCloseButtonNode;
      if (focusTarget && typeof focusTarget.focus === "function") {
        focusTarget.focus();
      }
    }

    function closeBackupsModal() {
      if (!backupsModalNode) return;
      clearRestoreCheckpointConfirmState();
      backupsModalNode.hidden = true;
      const focusTarget = modalLastFocusNode || backupsButtonNode;
      if (focusTarget && typeof focusTarget.focus === "function") {
        focusTarget.focus();
      }
      modalLastFocusNode = null;
    }

    function saveCheckpointSnapshot() {
      if (!hasSelectedChest()) return;
      clearRestoreCheckpointConfirmState();
      checkpointStatusText = "";
      if (sheetsModeEnabled) {
        const runner = getAppsScriptRunner();
        if (!runner) return;
        const snapshot = deepClone(buildWorkingSnapshot());
        checkpointActionInFlight = true;
        checkpointStatusText = "Saving backup...";
        renderBackupsModalState();
        runner
          .withSuccessHandler(function (response) {
            const envelope = unwrapServerEnvelope(response);
            checkpointActionInFlight = false;
            if (!envelope.ok) {
              checkpointStatusText = envelope.error || "Unable to save backup.";
              renderBackupsModalState();
              return;
            }
            setManualCheckpointFromServer(envelope.data && envelope.data.checkpoint ? envelope.data.checkpoint : null, snapshot);
            checkpointStatusText = "";
            setNonUndoableAction("Saved Backup");
            renderAllPreservingScroll();
            renderBackupsModalState();
          })
          .withFailureHandler(function (error) {
            checkpointActionInFlight = false;
            checkpointStatusText = getErrorMessage(error, "Unable to save backup.");
            renderBackupsModalState();
          })
          .lootSaveCheckpoint({
            snapshot: snapshot,
            chest_id: selectedChestId,
            label: "Manual Backup"
          });
        return;
      }
      manualCheckpoint = {
        savedAt: Date.now(),
        chests: deepClone(chestList),
        itemsByChest: deepClone(workingItemsByChest)
      };
      renderBackupsModalState();
    }

    function restoreCheckpointSnapshot() {
      if (!hasCheckpoint()) return;
      clearRestoreCheckpointConfirmState();
      checkpointStatusText = "";
      if (sheetsModeEnabled) {
        const runner = getAppsScriptRunner();
        if (!runner) return;
        checkpointActionInFlight = true;
        checkpointStatusText = "Restoring backup...";
        setSyncState("saving");
        renderAllPreservingScroll();
        renderBackupsModalState();
        runner
          .withSuccessHandler(function (response) {
            const envelope = unwrapServerEnvelope(response);
            checkpointActionInFlight = false;
            if (!envelope.ok) {
              checkpointStatusText = envelope.error || "Unable to restore backup.";
              setSyncState("retry", checkpointStatusText);
              renderAllPreservingScroll();
              renderBackupsModalState();
              return;
            }
            const restoredSnapshot = envelope.data && envelope.data.snapshot ? envelope.data.snapshot : null;
            if (!restoredSnapshot || typeof restoredSnapshot !== "object") {
              checkpointStatusText = "Backup restore returned no snapshot.";
              setSyncState("retry", checkpointStatusText);
              renderAllPreservingScroll();
              renderBackupsModalState();
              return;
            }
            applySnapshotToState(restoredSnapshot);
            if (envelope.data && envelope.data.data_version != null) {
              lastServerDataVersion = String(envelope.data.data_version);
            }
            setManualCheckpointFromServer(envelope.data && envelope.data.checkpoint ? envelope.data.checkpoint : null, restoredSnapshot);
            checkpointStatusText = "";
            pendingDeleteChestId = "";
            pendingDeleteGroupPrefix = "";
            selectedItemId = "";
            nextId = deriveNextItemIdCounter(workingItemsByChest);
            setDetailEditMode(false);
            clearUndoHistoryState();
            setNonUndoableAction("Restored Backup");
            setSyncState("saved");
            closeBackupsModal();
            renderAllPreservingScroll();
            return;
          })
          .withFailureHandler(function (error) {
            checkpointActionInFlight = false;
            checkpointStatusText = getErrorMessage(error, "Unable to restore backup.");
            setSyncState("retry", checkpointStatusText);
            renderAllPreservingScroll();
            renderBackupsModalState();
          })
          .lootRestoreCheckpoint({
            backup_id: manualCheckpoint && manualCheckpoint.backupId ? manualCheckpoint.backupId : ""
          });
        return;
      }
      chestList = deepClone(manualCheckpoint.chests || []);
      workingItemsByChest = deepClone(manualCheckpoint.itemsByChest || {});
      resetPendingOperations();
      queueForceSnapshotWrite();
      pendingDeleteChestId = "";
      pendingDeleteGroupPrefix = "";
      clearAutoSaveTimer();
      setSyncState("saving");
      setNonUndoableAction("Restored Backup");
      if (selectedChestId && !workingItemsByChest[selectedChestId]) {
        if (preferredSelectedChestId && chestList.some(function (chest) { return chest.chest_id === preferredSelectedChestId; })) {
          selectedChestId = preferredSelectedChestId;
        } else {
          selectedChestId = chestList.length ? chestList[0].chest_id : "";
        }
      }
      selectedItemId = "";
      nextId = deriveNextItemIdCounter(workingItemsByChest);
      setDetailEditMode(false);
      applyUiPreferencesForChest(selectedChestId);
      maybeEnableUnusedFilterForSelectedChest();
      persistUiPreferences();
      renderAll();
      closeBackupsModal();
      scheduleAutoSave(120);
    }

    function describeStatusMove(token, toStatus) {
      return token + " -> " + toDisplayStatus(toStatus);
    }

    function closeStatusPopover() {
      if (statusPopoverCloseTimer) {
        clearTimeout(statusPopoverCloseTimer);
        statusPopoverCloseTimer = null;
      }
      if (statusPopoverAnchorNode && statusPopoverAnchorNode.classList) {
        statusPopoverAnchorNode.classList.remove("is-popover-open");
      }
      if (statusPopoverAnchorRowNode && statusPopoverAnchorRowNode.classList) {
        statusPopoverAnchorRowNode.classList.remove("is-status-popover-anchor");
      }
      statusPopoverAnchorNode = null;
      statusPopoverAnchorRowNode = null;
      if (!statusPopoverNode) return;
      statusPopoverNode.hidden = true;
      statusPopoverItemId = "";
      statusPopoverNode.removeAttribute("data-item-id");
      statusPopoverNode.style.left = "";
      statusPopoverNode.style.top = "";
    }

    function openStatusPopoverForItem(itemId, anchorNode) {
      if (!statusPopoverNode || !itemId || !(anchorNode instanceof Element)) return;
      if (statusPopoverCloseTimer) {
        clearTimeout(statusPopoverCloseTimer);
        statusPopoverCloseTimer = null;
      }
      if (statusPopoverAnchorNode && statusPopoverAnchorNode.classList) {
        statusPopoverAnchorNode.classList.remove("is-popover-open");
      }
      if (statusPopoverAnchorRowNode && statusPopoverAnchorRowNode.classList) {
        statusPopoverAnchorRowNode.classList.remove("is-status-popover-anchor");
      }
      const item = getItemById(itemId);
      if (!item) return;
      statusPopoverItemId = itemId;
      statusPopoverNode.dataset.itemId = itemId;
      statusPopoverNode.hidden = false;
      statusPopoverAnchorNode = anchorNode;
      statusPopoverAnchorNode.classList.add("is-popover-open");
      statusPopoverAnchorRowNode = anchorNode.closest("tr[data-item-id]");
      if (statusPopoverAnchorRowNode) {
        statusPopoverAnchorRowNode.classList.add("is-status-popover-anchor");
      }

      const actionButtons = statusPopoverNode.querySelectorAll('[data-action="set-row-status"]');
      actionButtons.forEach(function (button) {
        const status = button.getAttribute("data-status");
        button.classList.toggle("is-current", status === item.status);
      });

      const rect = anchorNode.getBoundingClientRect();
      const popRect = statusPopoverNode.getBoundingClientRect();
      const viewportW = window.innerWidth || document.documentElement.clientWidth || 0;
      const viewportH = window.innerHeight || document.documentElement.clientHeight || 0;
      const gutter = 8;
      let left = rect.left + (rect.width / 2) - (popRect.width / 2);
      let top = rect.top - popRect.height - 6;
      if (left + popRect.width > viewportW - gutter) {
        left = viewportW - popRect.width - gutter;
      }
      if (left < gutter) left = gutter;
      if (top < gutter) {
        top = rect.bottom + 6;
      }
      if (top + popRect.height > viewportH - gutter) {
        top = Math.max(gutter, viewportH - popRect.height - gutter);
      }
      statusPopoverNode.style.left = Math.round(left) + "px";
      statusPopoverNode.style.top = Math.round(top) + "px";
    }

    function snapshotEditableFields(item) {
      return {
        item_name: item.item_name || "",
        rarity: item.rarity || "",
        type: item.type || "",
        description: item.description || "",
        item_url: item.item_url || "",
        notes: item.notes || ""
      };
    }

    function applyEditableFieldSnapshot(item, snapshot) {
      if (!item || !snapshot) return;
      item.item_name = snapshot.item_name || "";
      item.rarity = snapshot.rarity || "";
      item.type = snapshot.type || "";
      item.description = snapshot.description || "";
      item.item_url = snapshot.item_url || "";
      item.notes = snapshot.notes || "";
    }

    function tokenExistsActive(chestId, token, excludeItemId) {
      const normalizedToken = normalizeWhitespace(token).toLowerCase();
      return getActiveItems(chestId).some(function (item) {
        if (excludeItemId && item.item_id === excludeItemId) return false;
        return normalizeWhitespace(item.token).toLowerCase() === normalizedToken;
      });
    }

    function buildGroupNumberLookup(groupName) {
      const lookup = {};
      const groupKey = normalizePrefixKey(groupName);
      getActiveItems(selectedChestId).forEach(function (item) {
        const parts = parseTokenParts(item.token);
        if (normalizePrefixKey(parts.prefix) !== groupKey) return;
        if (!Number.isFinite(parts.number)) return;
        lookup[parts.number] = item;
      });
      return lookup;
    }

    function parseTokenRangeSpan() {
      const fromRaw = normalizeWhitespace(tokenRangeFromNode && tokenRangeFromNode.value);
      const toRaw = normalizeWhitespace(tokenRangeToNode && tokenRangeToNode.value);
      if (!fromRaw && !toRaw) {
        return { empty: true };
      }

      const baseRaw = fromRaw || toRaw;
      const fromParsed = Number(baseRaw);
      if (!Number.isInteger(fromParsed) || fromParsed < 1 || fromParsed > 999) {
        return { error: "Use 1-999" };
      }

      let toParsed = fromParsed;
      if (toRaw) {
        toParsed = Number(toRaw);
        if (!Number.isInteger(toParsed) || toParsed < 1 || toParsed > 999) {
          return { error: "Use 1-999" };
        }
      }

      const start = Math.min(fromParsed, toParsed);
      const end = Math.max(fromParsed, toParsed);
      return {
        from: start,
        to: end,
        count: (end - start) + 1
      };
    }

    function formatTokenRangeLabel(from, to) {
      return from === to ? String(from) : (String(from) + "-" + String(to));
    }

    function evaluateTokenRangePlan(action) {
      if (!hasSelectedChest()) {
        return { canApply: false, summary: "", reason: "Create chest first", isError: false };
      }

      const summaries = getGroupSummaries();
      if (!summaries.length) {
        return { canApply: false, summary: "", reason: "No groups available", isError: false };
      }

      const groupName = normalizeWhitespace(tokenRangeGroupNode && tokenRangeGroupNode.value);
      const group = getGroupByName(groupName);
      if (!group) {
        return { canApply: false, summary: "", reason: "Group required", isError: false };
      }

      const span = parseTokenRangeSpan();
      if (span.empty) {
        return { canApply: false, summary: "", reason: "Set range", isError: false, group: group };
      }
      if (span.error) {
        return { canApply: false, summary: span.error, reason: span.error, isError: true, group: group };
      }

      const lookup = buildGroupNumberLookup(group.name);
      let existing = 0;
      for (let number = span.from; number <= span.to; number += 1) {
        if (lookup[number]) existing += 1;
      }
      const missing = span.count - existing;
      const willAdd = missing;
      const willDelete = existing;
      const rangeLabel = formatTokenRangeLabel(span.from, span.to);
      let summary = "";
      let reason = "";
      let canApply = false;

      if (action === "add") {
        if (willAdd > 0) {
          canApply = true;
          summary = "R " + rangeLabel + " | +" + String(willAdd);
        } else {
          summary = "R " + rangeLabel + " | no change";
          reason = "All tokens already exist";
        }
      } else {
        if (willDelete > 0) {
          canApply = true;
          summary = "R " + rangeLabel + " | -" + String(willDelete);
        } else {
          summary = "R " + rangeLabel + " | no change";
          reason = "No tokens found in range";
        }
      }

      return {
        canApply: canApply,
        summary: summary,
        reason: reason,
        isError: false,
        action: action,
        group: group,
        from: span.from,
        to: span.to,
        count: span.count,
        existing: existing,
        missing: missing,
        willAdd: willAdd,
        willDelete: willDelete,
        lookup: lookup
      };
    }

    function renderTokenRangeState() {
      if (!tokenRangeGroupNode) return;
      const noChest = !hasSelectedChest() || isBootstrapping;
      const summaries = getGroupSummaries();
      const previous = tokenRangeGroupNode.value;

      clearNode(tokenRangeGroupNode);
      if (!summaries.length) {
        const empty = document.createElement("option");
        empty.value = "";
        empty.textContent = "No groups available";
        tokenRangeGroupNode.appendChild(empty);
      } else {
        const prompt = document.createElement("option");
        prompt.value = "";
        prompt.textContent = "Select group...";
        tokenRangeGroupNode.appendChild(prompt);
        summaries.forEach(function (summary) {
          const option = document.createElement("option");
          option.value = summary.name;
          option.textContent = summary.name;
          tokenRangeGroupNode.appendChild(option);
        });
      }

      if (summaries.length && summaries.some(function (summary) { return summary.name === previous; })) {
        tokenRangeGroupNode.value = previous;
      } else {
        tokenRangeGroupNode.value = "";
      }

      const disableControls = noChest || !summaries.length;
      tokenRangeGroupNode.disabled = disableControls;
      if (tokenRangeFromNode) tokenRangeFromNode.disabled = disableControls;
      if (tokenRangeToNode) tokenRangeToNode.disabled = disableControls;
      if (tokenRangeAddButtonNode) tokenRangeAddButtonNode.disabled = disableControls;
      if (tokenRangeDeleteButtonNode) tokenRangeDeleteButtonNode.disabled = disableControls;

      const addPlan = evaluateTokenRangePlan("add");
      const deletePlan = evaluateTokenRangePlan("delete");
      const addCountLabel = addPlan && Number.isInteger(addPlan.willAdd) ? String(addPlan.willAdd) : "--";
      const deleteCountLabel = deletePlan && Number.isInteger(deletePlan.willDelete) ? String(deletePlan.willDelete) : "--";

      if (tokenRangeAddButtonNode) {
        tokenRangeAddButtonNode.disabled = disableControls || !addPlan.canApply;
        tokenRangeAddButtonNode.title = addPlan.canApply ? "" : (addPlan.reason || "");
        tokenRangeAddButtonNode.textContent = "Add (" + addCountLabel + ")";
      }
      if (tokenRangeDeleteButtonNode) {
        tokenRangeDeleteButtonNode.disabled = disableControls || !deletePlan.canApply;
        tokenRangeDeleteButtonNode.title = deletePlan.canApply ? "" : (deletePlan.reason || "");
        tokenRangeDeleteButtonNode.textContent = "Delete (" + deleteCountLabel + ")";
      }

    }

    function applyTokenRangeChanges(action) {
      if (!hasSelectedChest()) return false;
      const plan = evaluateTokenRangePlan(action);
      if (!plan.canApply) return false;

      const items = getWorkingItems(selectedChestId);
      let firstCreatedId = "";

      if (plan.action === "add") {
        for (let number = plan.from; number <= plan.to; number += 1) {
          const token = plan.group.name + " " + String(number);
          if (plan.lookup[number]) {
            continue;
          }
          const newItem = createItem(selectedChestId, {
            token: token,
            item_name: "",
            status: STATUS.UNUSED,
            color_theme: plan.group.theme,
            category_label: plan.group.name
          });
          items.push(newItem);
          queueTokenUpsert(newItem);
          plan.lookup[number] = newItem;
          if (!firstCreatedId) firstCreatedId = newItem.item_id;
        }
        if (firstCreatedId) {
          selectedItemId = firstCreatedId;
          setDetailEditMode(true);
        }
        ensureListStatusFilter(STATUS.UNUSED);
      } else {
        const deletedIds = new Set();
        for (let number = plan.from; number <= plan.to; number += 1) {
          const item = plan.lookup[number];
          if (!item) {
            continue;
          }
          item.deleted = true;
          deletedIds.add(item.item_id);
          queueTokenDelete(item.item_id);
        }
        clearSelectionStateForDeletedItems(deletedIds);
      }

      clearUndoHistoryState();
      renderAll();
      if (plan.action === "add" && plan.group && plan.group.name) {
        scrollGroupIntoView(plan.group.name);
      }
      if (firstCreatedId) {
        focusItemNameForAutoEdit(firstCreatedId);
      }
      return true;
    }

    function getItemsForGroup(groupName) {
      const groupKey = normalizePrefixKey(groupName);
      return getActiveItems(selectedChestId).filter(function (item) {
        const parts = parseTokenParts(item.token);
        return normalizePrefixKey(parts.prefix) === groupKey;
      });
    }

    function createGroup() {
      if (!hasSelectedChest()) return false;
      const groupName = normalizeWhitespace(createGroupNameNode && createGroupNameNode.value);
      const groupTheme = resolveThemeValue(createGroupThemeNode && createGroupThemeNode.value);
      const tokenCountRaw = Number(normalizeWhitespace(createGroupCountNode && createGroupCountNode.value));

      if (!groupName || !groupTheme) {
        return false;
      }
      if (!Number.isInteger(tokenCountRaw) || tokenCountRaw < GROUP_COUNT_LIMITS.min || tokenCountRaw > GROUP_COUNT_LIMITS.max) {
        return false;
      }
      const tokenCount = clampNumber(tokenCountRaw, GROUP_COUNT_LIMITS.min, GROUP_COUNT_LIMITS.max);

      const summaries = getGroupSummaries();
      const exists = summaries.some(function (summary) {
        return normalizePrefixKey(summary.name) === normalizePrefixKey(groupName);
      });
      if (exists) {
        renderAll();
        return false;
      }

      const items = getWorkingItems(selectedChestId);
      let firstItemId = "";
      for (let idx = 1; idx <= tokenCount; idx += 1) {
        const token = groupName + " " + String(idx);
        if (tokenExistsActive(selectedChestId, token, "")) continue;
        const newItem = createItem(selectedChestId, {
          token: token,
          item_name: "",
          status: STATUS.UNUSED,
          color_theme: groupTheme,
          category_label: groupName
        });
        items.push(newItem);
        queueTokenUpsert(newItem);
        if (!firstItemId) {
          firstItemId = newItem.item_id;
        }
      }

      if (!firstItemId) {
        renderAll();
        return false;
      }

      selectedItemId = firstItemId;
      setDetailEditMode(true);
      ensureListStatusFilter(STATUS.UNUSED);
      clearUndoHistoryState();
      pendingDeleteGroupPrefix = "";

      if (createGroupNameNode) createGroupNameNode.value = "";
      if (createGroupCountNode) createGroupCountNode.value = String(DEFAULT_GROUP_COUNT);
      setManageTab("group-manage");
      renderAll();
      scrollGroupIntoView(groupName);
      focusItemNameForAutoEdit(firstItemId);
      if (manageGroupSelectNode) {
        manageGroupSelectNode.value = groupName;
        renderGroupEditorState();
      }
      return true;
    }

    function updateGroup() {
      if (!hasSelectedChest() || !manageGroupSelectNode) return false;
      const selectedName = normalizeWhitespace(manageGroupSelectNode.value);
      const group = getGroupByName(selectedName);
      if (!group) return false;

      const nextName = normalizeWhitespace(manageGroupNameNode && manageGroupNameNode.value);
      const nextTheme = resolveThemeValue(manageGroupThemeNode && manageGroupThemeNode.value);
      if (!nextName || !nextTheme) {
        return false;
      }

      const summaries = getGroupSummaries();
      const nameConflict = summaries.some(function (summary) {
        return normalizePrefixKey(summary.name) === normalizePrefixKey(nextName)
          && normalizePrefixKey(summary.name) !== normalizePrefixKey(group.name);
      });
      if (nameConflict) {
        renderAll();
        return false;
      }

      const targets = getItemsForGroup(group.name);
      if (!targets.length) {
        return false;
      }

      const collisionToken = targets.find(function (item) {
        const tokenParts = parseTokenParts(item.token);
        const suffix = Number.isFinite(tokenParts.number) ? String(tokenParts.number) : "";
        const nextToken = suffix ? (nextName + " " + suffix) : nextName;
        return tokenExistsActive(selectedChestId, nextToken, item.item_id);
      });
      if (collisionToken) {
        return false;
      }

      targets.forEach(function (item) {
        const tokenParts = parseTokenParts(item.token);
        const suffix = Number.isFinite(tokenParts.number) ? String(tokenParts.number) : "";
        item.token = suffix ? (nextName + " " + suffix) : nextName;
        item.category_label = nextName;
        item.color_theme = nextTheme;
        queueTokenUpsert(item);
      });

      if (manageGroupNameNode) {
        manageGroupNameNode.dataset.userEdited = "";
        manageGroupNameNode.dataset.groupSource = nextName;
      }
      if (manageGroupThemeNode) {
        manageGroupThemeNode.dataset.userEdited = "";
        manageGroupThemeNode.dataset.groupSource = nextName;
      }
      pendingDeleteGroupPrefix = "";
      clearUndoHistoryState();
      renderAll();
      if (manageGroupSelectNode) {
        manageGroupSelectNode.value = nextName;
        renderGroupEditorState();
      }
      return true;
    }

    function deleteGroup() {
      if (!hasSelectedChest() || !manageGroupSelectNode) return false;
      const selectedName = normalizeWhitespace(manageGroupSelectNode.value);
      if (!selectedName) return false;

      if (!pendingDeleteGroupPrefix || normalizePrefixKey(pendingDeleteGroupPrefix) !== normalizePrefixKey(selectedName)) {
        pendingDeleteGroupPrefix = selectedName;
        renderGroupEditorState();
        return false;
      }

      const targets = getItemsForGroup(selectedName);
      if (!targets.length) {
        clearDeleteGroupConfirmState();
        return false;
      }

      const deletedIds = new Set();
      targets.forEach(function (item) {
        item.deleted = true;
        deletedIds.add(item.item_id);
        queueTokenDelete(item.item_id);
      });
      clearSelectionStateForDeletedItems(deletedIds);

      pendingDeleteGroupPrefix = "";
      clearUndoHistoryState();
      renderAll();
      return true;
    }

    function openChestTools() {
      setManageTab("chest");
      if (chestSelectNode) {
        chestSelectNode.value = chestList.length ? (selectedChestId || chestList[0].chest_id) : CREATE_CHEST_OPTION;
      }
      renderChestToolsState();
    }

    function createChest() {
      const chestName = normalizeWhitespace(newChestNameNode && newChestNameNode.value);
      if (!chestName) return false;
      const duplicateName = chestList.some(function (chest) {
        return normalizeWhitespace(chest.chest_name).toLowerCase() === chestName.toLowerCase();
      });
      if (duplicateName) return false;

      const chestId = buildChestId(chestName);
      const nextChest = { chest_id: chestId, chest_name: chestName };
      chestList.push(nextChest);
      if (!persistedItemsByChest[chestId]) persistedItemsByChest[chestId] = [];
      if (!workingItemsByChest[chestId]) workingItemsByChest[chestId] = [];
      selectedChestId = chestId;
      selectedItemId = "";
      pendingDeleteChestId = "";
      pendingDeleteGroupPrefix = "";
      clearUndoHistoryState();
      applyUiPreferencesForChest(selectedChestId);
      maybeEnableUnusedFilterForSelectedChest();
      persistUiPreferences();
      if (newChestNameNode) newChestNameNode.value = "";
      setManageTab("group-create");
      renderAll();
      return true;
    }

    function deleteChest() {
      if (!deleteChestSelectNode) return false;
      const chestId = deleteChestSelectNode.value || "";
      if (!chestId) {
        pendingDeleteChestId = "";
        renderChestToolsState();
        return false;
      }
      if (!pendingDeleteChestId || pendingDeleteChestId !== chestId) {
        pendingDeleteChestId = chestId;
        renderChestToolsState();
        return false;
      }

      const deletedIds = new Set(
        getWorkingItems(chestId)
          .filter(function (item) { return item && !item.deleted; })
          .map(function (item) { return item.item_id; })
      );

      chestList = chestList.filter(function (chest) { return chest.chest_id !== chestId; });
      delete persistedItemsByChest[chestId];
      delete workingItemsByChest[chestId];
      queueDeleteChest(chestId);
      pendingDeleteChestId = "";
      pendingDeleteGroupPrefix = "";
      clearUndoHistoryState();

      clearSelectionStateForDeletedItems(deletedIds);

      if (selectedChestId === chestId) {
        if (preferredSelectedChestId && chestList.some(function (chest) { return chest.chest_id === preferredSelectedChestId && chest.chest_id !== chestId; })) {
          selectedChestId = preferredSelectedChestId;
        } else {
          selectedChestId = chestList.length ? chestList[0].chest_id : "";
        }
        selectedItemId = "";
        setDetailEditMode(false);
        detailDraftInitial = null;
      }

      if (!chestList.length) {
        selectedChestId = "";
        setManageTab("chest");
        setListStatusFilters([STATUS.IN_CHEST, STATUS.AWARDED], { persist: false });
      }
      applyUiPreferencesForChest(selectedChestId);
      maybeEnableUnusedFilterForSelectedChest();
      persistUiPreferences();
      renderAll();
      return true;
    }

    function applyStatusForItem(itemId, nextStatus) {
      const item = getItemById(itemId);
      if (!item) return false;
      const status = String(nextStatus || "").trim();
      if (!STATUS_LABELS[status]) return false;
      if (item.status === status) return false;
      const scrollState = captureScrollState();
      const active = document.activeElement;
      if (active instanceof HTMLElement && active.matches('button[data-action="set-row-status"], button[data-action="open-row-status"]')) {
        active.blur();
      }

      const previousStatus = item.status;
      item.status = status;
      queueTokenUpsert(item);
      markStatusJustChanged(item, status);
      lastChangeState = {
        kind: "status",
        item_id: item.item_id,
        token: item.token,
        from_status: previousStatus,
        to_status: status,
        mode: "undo",
        can_toggle: true
      };
      setHistoryState("Last: " + describeStatusMove(item.token, status), "is-info");
      renderAllPreservingScroll(scrollState);
      scheduleAutoSave(180);
      return true;
    }

    function toggleLastStatusChange() {
      if (!lastChangeState || !lastChangeState.can_toggle) return;
      const item = getItemById(lastChangeState.item_id);
      if (!item) {
        lastChangeState = null;
        setHistoryState("No changes made.", "is-idle");
        renderAll();
        return;
      }
      if (lastChangeState.kind === "status") {
        const token = lastChangeState.token || item.token;
        if (lastChangeState.mode === "undo") {
          item.status = lastChangeState.from_status;
          markStatusJustChanged(item, lastChangeState.from_status);
          lastChangeState.mode = "redo";
          setHistoryState("Undid: " + describeStatusMove(token, lastChangeState.to_status), "is-info");
        } else {
          item.status = lastChangeState.to_status;
          markStatusJustChanged(item, lastChangeState.to_status);
          lastChangeState.mode = "undo";
          setHistoryState("Redid: " + describeStatusMove(token, lastChangeState.to_status), "is-info");
        }
      } else if (lastChangeState.kind === "item-edit") {
        if (lastChangeState.mode === "undo") {
          applyEditableFieldSnapshot(item, lastChangeState.before);
          lastChangeState.mode = "redo";
          setHistoryState("Undid: Edited details for " + item.token, "is-info");
        } else {
          applyEditableFieldSnapshot(item, lastChangeState.after);
          lastChangeState.mode = "undo";
          setHistoryState("Redid: Edited details for " + item.token, "is-info");
        }
      } else {
        return;
      }
      queueTokenUpsert(item);
      renderAll();
      scheduleAutoSave(180);
    }

    function saveSelectedItem() {
      if (!isDetailEditing) return;
      const item = getItemById(selectedItemId);
      if (!item) return;
      const before = snapshotEditableFields(item);
      const after = {
        item_name: normalizeWhitespace(editItemNameNode.value),
        rarity: normalizeWhitespace(editRarityNode.value),
        type: normalizeWhitespace(editTypeNode.value),
        description: normalizeMultilineText(editDescriptionNode.value),
        item_url: normalizeWhitespace(editItemUrlNode.value),
        notes: normalizeMultilineText(editNotesNode.value)
      };

      applyEditableFieldSnapshot(item, after);
      queueTokenUpsert(item);
      lastChangeState = {
        kind: "item-edit",
        item_id: item.item_id,
        token: item.token,
        before: before,
        after: after,
        mode: "undo",
        can_toggle: true
      };

      setDetailEditMode(false);
      setHistoryState("Last: Edited details for " + item.token, "is-info");
      detailDraftInitial = null;
      renderAll();
      scheduleAutoSave(180);
    }

    function revertItemDraft() {
      setDetailEditMode(false);
      detailDraftInitial = null;
      renderDetail();
    }

    function deleteSelectedToken() {
      if (!hasSelectedChest()) return;
      const item = getItemById(selectedItemId);
      if (!item) return;
      item.deleted = true;
      queueTokenDelete(item.item_id);
      selectedItemId = "";
      setDetailEditMode(false);
      if (lastChangeState && lastChangeState.item_id === item.item_id) {
        clearUndoHistoryState();
      }
      renderAll();
      scheduleAutoSave(180);
    }

    function selectChest(nextChestId) {
      if (!nextChestId || !workingItemsByChest[nextChestId]) return;
      clearDeferredStatusState();
      selectedChestId = nextChestId;
      applyUiPreferencesForChest(selectedChestId);
      maybeEnableUnusedFilterForSelectedChest();
      selectedItemId = "";
      pendingDeleteChestId = "";
      pendingDeleteGroupPrefix = "";
      clearUndoHistoryState();
      setDetailEditMode(false);
      detailDraftInitial = null;
      persistUiPreferences();
      renderAll();
    }

    function shouldGuardAction(action) {
      if (!isDetailEditing || !isDetailDraftDirty()) return false;
      const safeActions = new Set([
        "save-item",
        "revert-item-draft",
        "toggle-detail-edit",
        "copy-item",
        "paste-item",
        "toggle-edit-first",
        "open-backups",
        "close-backups",
        "save-checkpoint",
        "restore-checkpoint",
        "retry-sync"
      ]);
      return !safeActions.has(action);
    }

    function handleRootClick(event) {
      if (isBootstrapping) return;
      if (backupsModalNode && !backupsModalNode.hidden && event.target === backupsModalNode) {
        closeBackupsModal();
        return;
      }

      const target = event && event.target;
      if (detailPointerDownInside && target instanceof Element && !target.closest("#lootV2DetailPanel")) {
        detailPointerDownInside = false;
        event.stopPropagation();
        return;
      }
      const isStatusPopoverOpen = !!(statusPopoverNode && !statusPopoverNode.hidden);
      const clickedStatusPopover = (target instanceof Element) ? target.closest("#lootV2StatusPopover") : null;
      const clickedStatusTrigger = (target instanceof Element) ? target.closest('button[data-action="open-row-status"]') : null;
      if (isStatusPopoverOpen && !clickedStatusPopover && !clickedStatusTrigger) {
        closeStatusPopover();
        event.stopPropagation();
        return;
      }
      const clickedStartupFloof = (target instanceof Element) ? target.closest("#lootV2StartupFloof") : null;
      if (clickedStartupFloof && root.contains(clickedStartupFloof)) {
        event.preventDefault();
        event.stopPropagation();
        beginStartupFloofDismissIfNeeded();
        return;
      }

      const actionButton = event.target.closest("button[data-action]");
      if (actionButton && root.contains(actionButton)) {
        event.stopPropagation();
        const action = actionButton.getAttribute("data-action");
        const actionItemId = actionButton.getAttribute("data-item-id");
        if (action !== "set-row-status" && action !== "open-row-status") {
          clearDeferredStatusStateAfterInteraction(actionItemId || "");
        }
        if (action !== "open-row-status" && action !== "set-row-status") {
          closeStatusPopover();
        }
        if (shouldGuardAction(action) && !ensureEditGuardResolved()) {
          return;
        }
        if (action !== "delete-chest") {
          clearDeleteConfirmState();
        }
        if (action !== "delete-group") {
          clearDeleteGroupConfirmState();
        }
        if (action === "group-count-inc") {
          adjustCreateGroupCount(1);
          return;
        }
        if (action === "group-count-dec") {
          adjustCreateGroupCount(-1);
          return;
        }
        if (action === "set-manage-tab") {
          const nextTab = actionButton.getAttribute("data-manage-tab");
          if (!hasSelectedChest() && nextTab !== "chest") return;
          clearDeleteGroupConfirmState();
          setManageTab(nextTab);
          return;
        }
        if (action === "retry-sync") {
          retrySyncNow();
          return;
        }
        if (action === "toggle-edit-first") {
          toggleEditFirstMode();
          return;
        }
        if (action === "open-backups") {
          openBackupsModal();
          return;
        }
        if (action === "close-backups") {
          closeBackupsModal();
          return;
        }
        if (action === "save-checkpoint") {
          saveCheckpointSnapshot();
          return;
        }
        if (action === "restore-checkpoint") {
          if (!restoreCheckpointConfirmArmed) {
            armRestoreCheckpointConfirmState();
            renderBackupsModalState();
            return;
          }
          restoreCheckpointSnapshot();
          return;
        }
        if (action === "undo-status-change") {
          toggleLastStatusChange();
          return;
        }
        if (action === "save-item") {
          saveSelectedItem();
          return;
        }
        if (action === "revert-item-draft") {
          revertItemDraft();
          return;
        }
        if (action === "copy-item") {
          if (copySelectedItemDetails()) {
            showDetailActionFeedback("Item details copied", "copy");
          }
          return;
        }
        if (action === "paste-item") {
          if (pasteClipboardIntoSelectedItemDraft()) {
            showDetailActionFeedback("Item details pasted", "paste");
          }
          return;
        }
        if (action === "toggle-detail-edit") {
          if (!selectedItemId) return;
          if (isDetailEditing) {
            revertItemDraft();
            return;
          }
          setDetailEditMode(true);
          return;
        }
        if (action === "open-row-status") {
          const itemId = actionButton.getAttribute("data-item-id");
          if (!itemId) return;
          if (isDetailEditing && !ensureEditGuardResolved()) return;
          const isDetailStatusTrigger = !!(
            actionButton.closest("#lootV2DetailPanel") ||
            (detailStatusChipNode && actionButton === detailStatusChipNode)
          );
          const hasOpenDetail = !!selectedItemId && root.classList.contains("loot-v2-has-detail");
          if (hasOpenDetail && itemId !== selectedItemId) {
            if (!ensureEditGuardResolved()) return;
            const scrollState = captureScrollState();
            if (itemId !== justChangedItemId && (deferredHiddenItemIds.size || justChangedItemId)) {
              clearDeferredStatusState();
            }
            selectedItemId = itemId;
            const selectedItem = getItemById(selectedItemId);
            const shouldAutoEdit = isEditFirstMode || isItemNameUnassigned(selectedItem);
            setDetailEditMode(shouldAutoEdit);
            showDetail(selectedItem);
            renderAllPreservingScroll(scrollState);
            if (shouldAutoEdit) {
              focusItemNameForAutoEdit(itemId);
            }
          }
          let anchorButton = actionButton;
          if (!isDetailStatusTrigger) {
            const refreshedRow = root.querySelector('tr[data-item-id="' + itemId + '"]');
            if (refreshedRow) {
              const refreshedAnchor = refreshedRow.querySelector('button[data-action="open-row-status"]');
              if (refreshedAnchor) {
                anchorButton = refreshedAnchor;
              }
            }
          }
          if (statusPopoverNode && !statusPopoverNode.hidden && statusPopoverItemId === itemId) {
            closeStatusPopover();
            return;
          }
          openStatusPopoverForItem(itemId, anchorButton);
          return;
        }
        if (action === "set-row-status") {
          if (!statusPopoverItemId) {
            closeStatusPopover();
            return;
          }
          const nextStatus = actionButton.getAttribute("data-status");
          const changed = applyStatusForItem(statusPopoverItemId, nextStatus);
          if (changed) {
            const status = actionButton.getAttribute("data-status");
            if (statusPopoverNode) {
              statusPopoverNode.querySelectorAll('[data-action="set-row-status"]').forEach(function (button) {
                button.classList.toggle("is-current", button.getAttribute("data-status") === status);
              });
            }
            statusPopoverCloseTimer = setTimeout(function () {
              closeStatusPopover();
            }, 180);
          } else {
            closeStatusPopover();
          }
          return;
        }
        if (action === "toggle-list-status-filter") {
          toggleListStatusFilter(actionButton.getAttribute("data-status"));
          return;
        }
        if (action === "delete-selected-token") {
          deleteSelectedToken();
          return;
        }
        if (action === "add-token-range") {
          if (applyTokenRangeChanges("add")) scheduleAutoSave(220);
          return;
        }
        if (action === "delete-token-range") {
          if (applyTokenRangeChanges("delete")) scheduleAutoSave(220);
          return;
        }
        if (action === "add-group") {
          if (createGroup()) scheduleAutoSave(220);
          return;
        }
        if (action === "update-group") {
          if (updateGroup()) scheduleAutoSave(220);
          return;
        }
        if (action === "delete-group") {
          if (deleteGroup()) scheduleAutoSave(220);
          return;
        }
        if (action === "create-chest") {
          if (createChest()) scheduleAutoSave(220);
          return;
        }
        if (action === "delete-chest") {
          if (deleteChest()) scheduleAutoSave(220);
          return;
        }
      }

      if (!event.target.closest("#lootV2DeleteChestSelect") && !event.target.closest("#lootV2DeleteChestBtn")) {
        clearDeleteConfirmState();
      }
      if (!event.target.closest("#lootV2ManageGroupSelect") && !event.target.closest("#lootV2DeleteGroupBtn")) {
        clearDeleteGroupConfirmState();
      }

      const clickedRow = event.target.closest("tr[data-item-id]");
      const clickedTokenCell = event.target.closest("td.loot-v2-token-cell");
      const clickedItemCell = event.target.closest("td.loot-v2-item-cell");
      if (clickedRow && clickedTokenCell && root.contains(clickedRow)) {
        event.stopPropagation();
        const itemId = clickedRow.getAttribute("data-item-id");
        if (!itemId) return;
        if (isDetailEditing && !ensureEditGuardResolved()) return;
        const hasOpenDetail = !!selectedItemId && root.classList.contains("loot-v2-has-detail");
        const rowForAnchor = root.querySelector('tr[data-item-id="' + itemId + '"]') || clickedRow;
        let statusAnchor = rowForAnchor ? rowForAnchor.querySelector('button[data-action="open-row-status"]') : null;
        if (itemId !== justChangedItemId && (deferredHiddenItemIds.size || justChangedItemId)) {
          const scrollState = captureScrollState();
          clearDeferredStatusState();
          renderAllPreservingScroll(scrollState);
          const refreshedRow = root.querySelector('tr[data-item-id="' + itemId + '"]');
          statusAnchor = refreshedRow ? refreshedRow.querySelector('button[data-action="open-row-status"]') : null;
        }
        if (hasOpenDetail && itemId !== selectedItemId) {
          if (!ensureEditGuardResolved()) return;
          const scrollState = captureScrollState();
          selectedItemId = itemId;
          const selectedItem = getItemById(selectedItemId);
          const shouldAutoEdit = isEditFirstMode || isItemNameUnassigned(selectedItem);
          setDetailEditMode(shouldAutoEdit);
          showDetail(selectedItem);
          renderAllPreservingScroll(scrollState);
          if (shouldAutoEdit) focusItemNameForAutoEdit(itemId);
          const refreshedRow = root.querySelector('tr[data-item-id="' + itemId + '"]');
          statusAnchor = refreshedRow ? refreshedRow.querySelector('button[data-action="open-row-status"]') : null;
        }
        if (statusAnchor) {
          if (statusPopoverNode && !statusPopoverNode.hidden && statusPopoverItemId === itemId) {
            closeStatusPopover();
          } else {
            openStatusPopoverForItem(itemId, statusAnchor);
          }
        }
        return;
      }
      if (clickedRow && clickedItemCell && root.contains(clickedRow)) {
        event.stopPropagation();
        const itemId = clickedRow.getAttribute("data-item-id");
        if (!itemId || itemId !== justChangedItemId) {
          clearDeferredStatusState();
        }
        if (itemId && itemId !== selectedItemId) {
          if (!ensureEditGuardResolved()) return;
          selectedItemId = itemId;
          const selectedItem = getItemById(selectedItemId);
          const shouldAutoEdit = isEditFirstMode || isItemNameUnassigned(selectedItem);
          setDetailEditMode(shouldAutoEdit);
          showDetail(selectedItem);
          renderAll();
          if (shouldAutoEdit) focusItemNameForAutoEdit(itemId);
        } else if (itemId && itemId === selectedItemId) {
          if (!ensureEditGuardResolved()) return;
          clearSelectedItem();
        }
      }
    }

    function handleDocumentClick(event) {
      const target = event && event.target;
      if (detailPointerDownInside) {
        detailPointerDownInside = false;
        return;
      }
      if (statusPopoverNode && !statusPopoverNode.hidden) {
        const clickedPopover = (target instanceof Element) ? target.closest("#lootV2StatusPopover") : null;
        if (!clickedPopover) {
          closeStatusPopover();
          event.stopPropagation();
          return;
        }
      }
      if (!root || !root.classList.contains("loot-v2-has-detail")) return;
      if (isDetailPersistentClickTarget(target)) return;
      if (!ensureEditGuardResolved()) return;
      clearSelectedItem({ preserveDeferredStatus: true });
    }

    function handleDocumentPointerDown(event) {
      const target = event && event.target;
      detailPointerDownInside = !!(target instanceof Element && target.closest("#lootV2DetailPanel"));
    }

    function handleGlobalScrollForStatusPopover() {
      if (!statusPopoverNode || statusPopoverNode.hidden) return;
      closeStatusPopover();
    }

    function handleDocumentKeydown(event) {
      if (!event || event.key !== "Escape") return;
      if (backupsModalNode && !backupsModalNode.hidden) {
        event.preventDefault();
        event.stopPropagation();
        closeBackupsModal();
        return;
      }
      if (statusPopoverNode && !statusPopoverNode.hidden) {
        event.preventDefault();
        event.stopPropagation();
        closeStatusPopover();
      }
    }

    function handleBackupsModalClick(event) {
      if (!backupsModalNode || backupsModalNode.hidden) return;
      const target = event && event.target;
      if (!(target instanceof Element)) return;
      if (target === backupsModalNode || target.closest('[data-action="close-backups"]')) {
        event.preventDefault();
        event.stopPropagation();
        closeBackupsModal();
      }
    }

    function bindBackupsModalHandlers() {
      if (backupsModalNode && !backupsModalNode.dataset.boundCloseHandler) {
