    function deepClone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function readLocalModeSnapshot() {
      try {
        if (typeof window === "undefined" || !window.localStorage) return null;
        const raw = window.localStorage.getItem(LOCAL_MODE_SNAPSHOT_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return null;
        if (!Array.isArray(parsed.chests)) return null;
        if (!parsed.itemsByChest || typeof parsed.itemsByChest !== "object") return null;
        return parsed;
      } catch (ignore) {
        return null;
      }
    }

    function writeLocalModeSnapshot(snapshot) {
      try {
        if (typeof window === "undefined" || !window.localStorage) return;
        if (!snapshot || typeof snapshot !== "object") return;
        window.localStorage.setItem(LOCAL_MODE_SNAPSHOT_KEY, JSON.stringify(snapshot));
      } catch (ignore) {
        // Ignore localStorage write errors (quota/privacy mode).
      }
    }

    function clearLocalModeSnapshot() {
      try {
        if (typeof window === "undefined" || !window.localStorage) return;
        window.localStorage.removeItem(LOCAL_MODE_SNAPSHOT_KEY);
      } catch (ignore) {
        // Ignore localStorage removal errors (quota/privacy mode).
      }
    }

    function readUiPreferences() {
      try {
        if (typeof window === "undefined" || !window.localStorage) return null;
        const raw = window.localStorage.getItem(UI_PREFS_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return null;
        return parsed;
      } catch (ignore) {
        return null;
      }
    }

    function writeUiPreferences(preferences) {
      try {
        if (typeof window === "undefined" || !window.localStorage) return;
        if (!preferences || typeof preferences !== "object") return;
        window.localStorage.setItem(UI_PREFS_KEY, JSON.stringify(preferences));
      } catch (ignore) {
        // Ignore localStorage write errors (quota/privacy mode).
      }
    }

    function sanitizeUiPreferenceEntry(entry) {
      if (!entry || typeof entry !== "object") return null;
      const statuses = STATUS_ORDER.filter(function (status) {
        return Array.isArray(entry.statusFilters) && entry.statusFilters.indexOf(status) !== -1;
      });
      return {
        statusFilters: statuses.length ? statuses : defaultListStatusFilters.slice(),
        searchTerm: typeof entry.searchTerm === "string" ? entry.searchTerm : ""
      };
    }

    function getCurrentUiPreferenceEntry() {
      const rawSearch = searchInputNode
        ? String(searchInputNode.value || "")
        : String(searchTerm || "");
      return sanitizeUiPreferenceEntry({
        statusFilters: getActiveFilterList(),
        searchTerm: rawSearch
      }) || {
        statusFilters: defaultListStatusFilters.slice(),
        searchTerm: ""
      };
    }

    function applyUiPreferencesForChest(chestId) {
      const chestKey = normalizeWhitespace(chestId);
      const scoped = chestKey ? uiPrefsByChest[chestKey] : null;
      const pref = scoped || fallbackUiPreference;
      const statuses = pref && Array.isArray(pref.statusFilters) && pref.statusFilters.length
        ? pref.statusFilters
        : defaultListStatusFilters.slice();
      const rawSearch = pref && typeof pref.searchTerm === "string" ? pref.searchTerm : "";
      setListStatusFilters(statuses, { persist: false });
      searchTerm = rawSearch.trim().toLowerCase();
      if (searchInputNode) {
        searchInputNode.value = rawSearch;
      }
    }

    function buildUiPreferencesForStorage() {
      const byChest = {};
      Object.keys(uiPrefsByChest || {}).forEach(function (chestId) {
        const normalizedId = normalizeWhitespace(chestId);
        if (!normalizedId) return;
        const normalizedPref = sanitizeUiPreferenceEntry(uiPrefsByChest[chestId]);
        if (!normalizedPref) return;
        byChest[normalizedId] = normalizedPref;
      });

      const selectedChestKey = normalizeWhitespace(selectedChestId);
      if (selectedChestKey) {
        byChest[selectedChestKey] = getCurrentUiPreferenceEntry();
      }

      const legacy = selectedChestKey && byChest[selectedChestKey]
        ? byChest[selectedChestKey]
        : getCurrentUiPreferenceEntry();

      return {
        lastSelectedChestId: selectedChestKey || normalizeWhitespace(preferredSelectedChestId),
        byChest: byChest,
        // Backward-compatible top-level fields for older builds.
        statusFilters: legacy.statusFilters,
        searchTerm: legacy.searchTerm
      };
    }

    function persistUiPreferences() {
      writeUiPreferences(buildUiPreferencesForStorage());
    }

    function applyStoredUiPreferences() {
      const prefs = readUiPreferences();
      uiPrefsByChest = {};
      preferredSelectedChestId = "";
      fallbackUiPreference = null;
      if (!prefs) return;

      if (prefs.byChest && typeof prefs.byChest === "object") {
        Object.keys(prefs.byChest).forEach(function (chestId) {
          const normalizedId = normalizeWhitespace(chestId);
          if (!normalizedId) return;
          const normalizedPref = sanitizeUiPreferenceEntry(prefs.byChest[chestId]);
          if (!normalizedPref) return;
          uiPrefsByChest[normalizedId] = normalizedPref;
        });
      }

      if (typeof prefs.lastSelectedChestId === "string") {
        preferredSelectedChestId = normalizeWhitespace(prefs.lastSelectedChestId);
      }

      const legacy = sanitizeUiPreferenceEntry({
        statusFilters: Array.isArray(prefs.statusFilters) ? prefs.statusFilters : [],
        searchTerm: typeof prefs.searchTerm === "string" ? prefs.searchTerm : ""
      });
      if (legacy) {
        fallbackUiPreference = legacy;
      }
    }

    function clearBootstrapRunnerWaitTimer() {
      if (!bootstrapRunnerWaitTimer) return;
      clearTimeout(bootstrapRunnerWaitTimer);
      bootstrapRunnerWaitTimer = null;
    }

    function buildLocalModeSnapshotForStorage() {
      return {
        chests: deepClone(chestList),
        itemsByChest: deepClone(workingItemsByChest),
        selectedChestId: selectedChestId || "",
        selectedItemId: selectedItemId || "",
        savedAt: Date.now()
      };
    }

    function applyLocalSnapshotOrFallback(options) {
      const settings = options && typeof options === "object" ? options : {};
      const explicitSnapshot = settings.snapshot && typeof settings.snapshot === "object"
        ? settings.snapshot
        : null;
      const snapshot = explicitSnapshot || readLocalModeSnapshot();
      const allowDummyFallback = !!settings.allowDummyFallback;

      if (snapshot) {
        applySnapshotToState({
          chests: snapshot.chests,
          itemsByChest: snapshot.itemsByChest
        });
        const desiredChestId = normalizeWhitespace(snapshot.selectedChestId);
        if (desiredChestId && chestList.some(function (chest) { return chest.chest_id === desiredChestId; })) {
          selectedChestId = desiredChestId;
        } else if (preferredSelectedChestId && chestList.some(function (chest) { return chest.chest_id === preferredSelectedChestId; })) {
          selectedChestId = preferredSelectedChestId;
        } else {
          selectedChestId = chestList.length ? chestList[0].chest_id : "";
        }
        const desiredItemId = normalizeWhitespace(snapshot.selectedItemId);
        if (desiredItemId && getItemById(desiredItemId)) {
          selectedItemId = desiredItemId;
        } else {
          selectedItemId = "";
        }
        applyUiPreferencesForChest(selectedChestId);
        maybeEnableUnusedFilterForSelectedChest();
        return true;
      }

      if (!allowDummyFallback) {
        applySnapshotToState({
          chests: [],
          itemsByChest: {}
        });
        selectedChestId = "";
        selectedItemId = "";
        applyUiPreferencesForChest("");
        maybeEnableUnusedFilterForSelectedChest();
        return false;
      }

      const dummy = buildDummyState();
      applySnapshotToState({
        chests: dummy.chests,
        itemsByChest: dummy.itemsByChest
      });
      selectedChestId = chestList.length ? chestList[0].chest_id : "";
      selectedItemId = "";
      applyUiPreferencesForChest(selectedChestId);
      maybeEnableUnusedFilterForSelectedChest();
      writeLocalModeSnapshot(buildLocalModeSnapshotForStorage());
      return false;
    }

    function isLegacyDummySnapshot(snapshot) {
      if (!snapshot || !Array.isArray(snapshot.chests)) return false;
      if (snapshot.chests.length < 2) return false;
      const chestIdSet = new Set(snapshot.chests.map(function (chest) {
        return normalizeWhitespace(chest && chest.chest_id);
      }));
      const chestNameSet = new Set(snapshot.chests.map(function (chest) {
        return normalizeWhitespace(chest && chest.chest_name).toLowerCase();
      }));
      const hasLegacyIds = chestIdSet.has("main_campaign") && chestIdSet.has("boss_vault");
      const hasLegacyNames = chestNameSet.has("main campaign chest") && chestNameSet.has("boss vault");
      return hasLegacyIds || hasLegacyNames;
    }

    function sanitizeBootstrapFallbackSnapshot(snapshot) {
      if (!snapshot || typeof snapshot !== "object") return null;
      if (isLegacyDummySnapshot(snapshot)) return null;
      return snapshot;
    }

    function normalizeWhitespace(value) {
      return String(value || "").trim().replace(/\s+/g, " ");
    }

    function normalizeMultilineText(value) {
      return String(value || "")
        .replace(/\r\n?/g, "\n")
        .split("\n")
        .map(function (line) {
          return line.replace(/[ \t]+/g, " ").trimEnd();
        })
        .join("\n")
        .trim();
    }

    function getPrimaryScrollHost() {
      let node = root ? root.parentElement : null;
      while (node && node !== document.body && node !== document.documentElement) {
        const styles = window.getComputedStyle(node);
        const overflowY = styles ? styles.overflowY : "";
        if ((overflowY === "auto" || overflowY === "scroll") && node.scrollHeight > node.clientHeight) {
          return node;
        }
        node = node.parentElement;
      }
      return document.scrollingElement || document.documentElement;
    }

    function captureScrollState() {
      const tableScroll = document.getElementById("lootV2TableScroll");
      const detailScroll = document.getElementById("lootV2DetailScroll");
      const host = getPrimaryScrollHost();
      return {
        host: host,
        hostTop: host ? host.scrollTop : 0,
        hostLeft: host ? host.scrollLeft : 0,
        tableTop: tableScroll ? tableScroll.scrollTop : null,
        detailTop: detailScroll ? detailScroll.scrollTop : null
      };
    }

    function restoreScrollState(state) {
      if (!state) return;
      const apply = function () {
        const host = state.host || getPrimaryScrollHost();
        if (host) {
          if (Math.abs((host.scrollTop || 0) - (state.hostTop || 0)) > 1) {
            host.scrollTop = state.hostTop || 0;
          }
          if (Math.abs((host.scrollLeft || 0) - (state.hostLeft || 0)) > 1) {
            host.scrollLeft = state.hostLeft || 0;
          }
        }
        const tableScroll = document.getElementById("lootV2TableScroll");
        if (tableScroll && state.tableTop !== null) {
          tableScroll.scrollTop = state.tableTop;
        }
        const detailScroll = document.getElementById("lootV2DetailScroll");
        if (detailScroll && state.detailTop !== null) {
          detailScroll.scrollTop = state.detailTop;
        }
      };
      apply();
      requestAnimationFrame(apply);
    }

    function renderAllPreservingScroll(existingState) {
      const state = existingState || captureScrollState();
      renderAll();
      restoreScrollState(state);
      return state;
    }

    function clampNumber(value, min, max) {
      const parsed = Number(value);
      const safeValue = Number.isFinite(parsed) ? parsed : min;
      return Math.max(min, Math.min(max, safeValue));
    }

    function buildItemId(chestId) {
      const id = chestId + "_item_" + String(nextId);
      nextId += 1;
      return id;
    }

    function buildChestId(name) {
      const base = normalizeWhitespace(name).toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "");
      const seed = base || "loot_chest";
      let next = seed;
      let index = 2;
      while (chestList.some(function (chest) { return chest.chest_id === next; })) {
        next = seed + "_" + String(index);
        index += 1;
      }
      return next;
    }

    function parseTokenParts(token) {
      const normalized = normalizeWhitespace(token);
      const match = normalized.match(/^(.*?)(\d+)$/);
      if (!match) {
        return { prefix: normalized, number: Number.POSITIVE_INFINITY, raw: normalized };
      }
      return {
        prefix: normalizeWhitespace(match[1]),
        number: Number(match[2]),
        raw: normalized
      };
    }

    function compareTokens(aToken, bToken) {
      const a = parseTokenParts(aToken);
      const b = parseTokenParts(bToken);
      const prefixDiff = a.prefix.localeCompare(b.prefix, undefined, { sensitivity: "base" });
      if (prefixDiff !== 0) return prefixDiff;
      if (a.number !== b.number) return a.number - b.number;
      return a.raw.localeCompare(b.raw, undefined, { sensitivity: "base" });
    }

    function normalizePrefixKey(prefix) {
      return normalizeWhitespace(prefix).toLowerCase();
    }

    function toDisplayStatus(status) {
      return STATUS_LABELS[status] || status;
    }

    function getStatusClass(status) {
      if (status === STATUS.IN_CHEST) return "status-in-chest";
      if (status === STATUS.AWARDED) return "status-awarded";
      if (status === STATUS.UNUSED) return "status-unused";
      return "";
    }

    function getStatusClassSuffix(status) {
      if (status === STATUS.IN_CHEST) return "in-chest";
      if (status === STATUS.AWARDED) return "awarded";
      if (status === STATUS.UNUSED) return "unused";
      return "unknown";
    }

    function getStatusGlyph(status) {
      if (status === STATUS.AWARDED) return "\u2705";
      if (status === STATUS.UNUSED) return "\u2796";
      return "\ud83d\udce6";
    }

    function normalizeThemeKey(value) {
      return normalizeWhitespace(value).toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function findThemeByKey(value) {
      const key = normalizeThemeKey(value);
      if (!key) return null;
      const aliasValue = THEME_ALIASES[key];
      if (aliasValue) {
        return COLOR_THEMES.find(function (theme) {
          return theme.value === aliasValue;
        }) || null;
      }
      return COLOR_THEMES.find(function (theme) {
        return normalizeThemeKey(theme.value) === key || normalizeThemeKey(theme.label) === key;
      }) || null;
    }

    function getColorLabelByValue(value) {
      const hit = findThemeByKey(value);
      return hit ? hit.label : "";
    }

    function inferThemeFromTokenPrefix(prefix) {
      const hit = findThemeByKey(prefix);
      return hit ? hit.value : "";
    }

    function parseHexColor(value) {
      const normalized = String(value || "").trim().replace(/^#/, "");
      if (!/^[0-9a-fA-F]{6}$/.test(normalized)) return null;
      return {
        r: parseInt(normalized.slice(0, 2), 16),
        g: parseInt(normalized.slice(2, 4), 16),
        b: parseInt(normalized.slice(4, 6), 16)
      };
    }

    function channelToHex(channel) {
      const clamped = Math.max(0, Math.min(255, Math.round(channel)));
      const hex = clamped.toString(16);
      return hex.length === 1 ? "0" + hex : hex;
    }

    function rgbToHex(rgb) {
      return "#" + channelToHex(rgb.r) + channelToHex(rgb.g) + channelToHex(rgb.b);
    }

    function mixHexColors(baseHex, targetHex, targetWeight) {
      const baseRgb = parseHexColor(baseHex);
      const targetRgb = parseHexColor(targetHex);
      if (!baseRgb || !targetRgb) return baseHex || targetHex || "#4f78bf";
      const t = Math.max(0, Math.min(1, Number(targetWeight) || 0));
      return rgbToHex({
        r: baseRgb.r * (1 - t) + targetRgb.r * t,
        g: baseRgb.g * (1 - t) + targetRgb.g * t,
        b: baseRgb.b * (1 - t) + targetRgb.b * t
      });
    }

    function relativeLuminance(hexColor) {
      const rgb = parseHexColor(hexColor);
      if (!rgb) return 0.5;
      function toLinear(channel) {
        const value = channel / 255;
        return value <= 0.03928 ? value / 12.92 : Math.pow((value + 0.055) / 1.055, 2.4);
      }
      return (0.2126 * toLinear(rgb.r)) + (0.7152 * toLinear(rgb.g)) + (0.0722 * toLinear(rgb.b));
    }

    function pickTextColor(backgroundHex) {
      return relativeLuminance(backgroundHex) > 0.44 ? "#1f2f4d" : "#ffffff";
    }

    function resolveThemeValue(value) {
      const theme = findThemeByKey(value);
      return theme ? theme.value : "";
    }

    function getGroupPalette(themeValue) {
      const resolvedTheme = resolveThemeValue(themeValue) || "blue";
      const override = THEME_PALETTE_OVERRIDES[resolvedTheme];
      if (override) {
        return {
          headerBg: override.headerBg,
          headerText: override.headerText,
          rowOddBg: override.rowOddBg,
          rowEvenBg: override.rowEvenBg,
          edge: override.edge,
          labelText: override.labelText
        };
      }

      const base = THEME_BASE_COLORS[resolvedTheme] || "#4f78bf";
      const headerBg = mixHexColors(base, "#172640", 0.26);
      return {
        headerBg: headerBg,
        headerText: pickTextColor(headerBg),
        rowOddBg: mixHexColors(base, "#ffffff", 0.88),
        rowEvenBg: mixHexColors(base, "#ffffff", 0.8),
        edge: mixHexColors(base, "#d5e1f2", 0.7),
        labelText: mixHexColors(base, "#203252", 0.55)
      };
    }

    function createItem(chestId, fields) {
      return {
        item_id: buildItemId(chestId),
        chest_id: chestId,
        token: normalizeWhitespace(fields.token),
        status: fields.status || STATUS.UNUSED,
        item_name: normalizeWhitespace(fields.item_name),
        rarity: normalizeWhitespace(fields.rarity),
        type: normalizeWhitespace(fields.type),
        attunement_required: !!fields.attunement_required,
        description: normalizeMultilineText(fields.description),
        item_url: normalizeWhitespace(fields.item_url),
        notes: normalizeMultilineText(fields.notes),
        color_theme: fields.color_theme || "",
        category_label: normalizeWhitespace(fields.category_label),
        deleted: !!fields.deleted
      };
    }

    function buildDummySeries(chestId, theme, count, groupOffset) {
      const items = [];
      for (let index = 1; index <= count; index += 1) {
        const seed = groupOffset + index;
        const template = ITEM_LIBRARY[seed % ITEM_LIBRARY.length];
        let status = STATUS.IN_CHEST;
        if (seed % 9 === 0) {
          status = STATUS.AWARDED;
        } else if (seed % 4 === 0) {
          status = STATUS.UNUSED;
        }

        const isUnassigned = status === STATUS.UNUSED && seed % 2 === 0;
        items.push(createItem(chestId, {
          token: theme.label + " " + String(index),
          status: status,
          item_name: isUnassigned ? "" : template.name,
          rarity: isUnassigned ? "" : template.rarity,
          type: isUnassigned ? "" : template.type,
          description: isUnassigned ? "" : template.description,
          notes: isUnassigned ? "" : (seed % 6 === 0 ? "Reserve for milestone pacing." : ""),
          color_theme: theme.value,
          category_label: theme.label
        }));
      }
      return items;
    }

    function buildDummyState() {
      const chests = [
        { chest_id: "main_campaign", chest_name: "Main Campaign Chest" },
        { chest_id: "boss_vault", chest_name: "Boss Vault" }
      ];

      const mainThemes = [
        "blue",
        "light-blue",
        "orange",
        "yellow",
        "red",
        "pink",
        "green",
        "light-green",
        "purple",
        "light-purple"
      ];

      const vaultThemes = [
        "white",
        "black",
        "gray",
        "blue",
        "red",
        "purple",
        "green",
        "orange"
      ];

      const byChest = {
        main_campaign: [],
        boss_vault: []
      };

      mainThemes.forEach(function (themeValue, index) {
        const theme = findThemeByKey(themeValue);
        if (!theme) return;
        byChest.main_campaign = byChest.main_campaign.concat(
          buildDummySeries("main_campaign", theme, 10, index * 13)
        );
      });

      vaultThemes.forEach(function (themeValue, index) {
        const theme = findThemeByKey(themeValue);
        if (!theme) return;
        byChest.boss_vault = byChest.boss_vault.concat(
          buildDummySeries("boss_vault", theme, 8, 100 + (index * 11))
        );
      });

      return { chests: chests, itemsByChest: byChest };
    }

    function getAppsScriptRunner() {
      if (typeof google === "undefined" || !google || !google.script || !google.script.run) {
        return null;
      }
      return google.script.run;
    }

    function unwrapServerEnvelope(response) {
      if (response && typeof response === "object" && Object.prototype.hasOwnProperty.call(response, "ok")) {
        if (response.ok === false) {
          return {
            ok: false,
            error: normalizeWhitespace(response.error) || "Request failed.",
            data: response.data || null
          };
        }
        return { ok: true, data: response.data || {} };
      }
      return { ok: true, data: response || {} };
    }

    function getErrorMessage(error, fallback) {
      if (!error) return fallback || "Request failed.";
      if (typeof error === "string") {
        return normalizeWhitespace(error) || (fallback || "Request failed.");
      }
      if (error && typeof error.message === "string") {
        return normalizeWhitespace(error.message) || (fallback || "Request failed.");
      }
      try {
        const text = JSON.stringify(error);
        return normalizeWhitespace(text) || (fallback || "Request failed.");
      } catch (ignore) {
        return fallback || "Request failed.";
      }
    }

    function normalizeServerStatus(status) {
      const safe = normalizeWhitespace(status).toUpperCase();
      if (safe === STATUS.AWARDED) return STATUS.AWARDED;
      if (safe === STATUS.UNUSED || safe === "INACTIVE") return STATUS.UNUSED;
      return STATUS.IN_CHEST;
    }

    function deriveNextItemIdCounter(itemsByChest) {
      let maxSeen = 0;
      Object.keys(itemsByChest || {}).forEach(function (chestId) {
        const items = Array.isArray(itemsByChest[chestId]) ? itemsByChest[chestId] : [];
        items.forEach(function (item) {
          const itemId = String(item && item.item_id ? item.item_id : "");
          const match = itemId.match(/_item_(\d+)$/i);
          if (!match) return;
          const parsed = Number(match[1]);
          if (Number.isInteger(parsed) && parsed > maxSeen) {
            maxSeen = parsed;
          }
        });
      });
      return Math.max(1, maxSeen + 1);
    }

    function applySnapshotToState(snapshot) {
      const nextChests = Array.isArray(snapshot && snapshot.chests) ? snapshot.chests : [];
      const nextItemsByChest = snapshot && typeof snapshot.itemsByChest === "object"
        ? snapshot.itemsByChest
        : {};

      chestList = deepClone(nextChests);
      workingItemsByChest = deepClone(nextItemsByChest);
      persistedChestList = deepClone(nextChests);
      persistedItemsByChest = deepClone(nextItemsByChest);

      if (selectedChestId && chestList.some(function (chest) { return chest.chest_id === selectedChestId; })) {
        // Keep selected chest when still available.
      } else if (preferredSelectedChestId && chestList.some(function (chest) { return chest.chest_id === preferredSelectedChestId; })) {
        selectedChestId = preferredSelectedChestId;
      } else {
        selectedChestId = chestList.length ? chestList[0].chest_id : "";
      }

      if (!selectedChestId || !workingItemsByChest[selectedChestId]) {
        selectedItemId = "";
      } else if (!getItemById(selectedItemId)) {
        selectedItemId = "";
      }

      applyUiPreferencesForChest(selectedChestId);
      maybeEnableUnusedFilterForSelectedChest();

      nextId = deriveNextItemIdCounter(workingItemsByChest);
      resetPendingOperations();
    }

    function normalizeSheetsBootstrap(bootstrapData) {
      const mode = normalizeWhitespace(bootstrapData && bootstrapData.mode).toLowerCase();
      if (mode !== "sheets" || !(bootstrapData && bootstrapData.enabled)) {
        return null;
      }

      const chestMap = {};
      const itemsByChest = {};
      const chests = [];

      const sourceChests = Array.isArray(bootstrapData.chests) ? bootstrapData.chests : [];
      sourceChests.forEach(function (chest) {
        const chestId = normalizeWhitespace(chest && chest.chest_id);
        if (!chestId || chestMap[chestId]) return;
        const record = {
          chest_id: chestId,
          chest_name: normalizeWhitespace(chest.chest_name) || chestId
        };
        chestMap[chestId] = record;
        chests.push(record);
        itemsByChest[chestId] = [];
      });

      const sourceTokens = Array.isArray(bootstrapData.tokens) ? bootstrapData.tokens : [];
      sourceTokens.forEach(function (token, index) {
        if (!token) return;
        const chestId = normalizeWhitespace(token.chest_id);
        if (!chestId) return;
        if (!chestMap[chestId]) {
          const inferredChest = {
            chest_id: chestId,
            chest_name: normalizeWhitespace(token.chest_name) || chestId
          };
          chestMap[chestId] = inferredChest;
          chests.push(inferredChest);
          itemsByChest[chestId] = [];
        }
        if (!itemsByChest[chestId]) {
          itemsByChest[chestId] = [];
        }

        const tokenLabel = normalizeWhitespace(token.token_label || token.token);
        if (!tokenLabel) return;
        const tokenParts = parseTokenParts(tokenLabel);
        const groupLabel = normalizeWhitespace(token.group_name) || normalizeWhitespace(tokenParts.prefix);
        const themeValue = resolveThemeValue(token.theme_key)
          || inferThemeFromTokenPrefix(groupLabel)
          || "";

        itemsByChest[chestId].push({
          item_id: normalizeWhitespace(token.token_id) || ("sheet_item_" + String(index + 1)),
          chest_id: chestId,
          token: tokenLabel,
          status: normalizeServerStatus(token.status),
          item_name: normalizeWhitespace(token.item_name),
          rarity: normalizeWhitespace(token.rarity),
          type: normalizeWhitespace(token.type),
          attunement_required: false,
          description: normalizeMultilineText(token.description),
          item_url: normalizeWhitespace(token.item_link || token.item_url),
          notes: normalizeMultilineText(token.notes),
          color_theme: themeValue,
          category_label: groupLabel,
          deleted: false
        });
      });

      chests.sort(function (a, b) {
        return String(a.chest_name || "").localeCompare(String(b.chest_name || ""), undefined, { sensitivity: "base" });
      });

      Object.keys(itemsByChest).forEach(function (chestId) {
        itemsByChest[chestId].sort(function (a, b) {
          return compareTokens(a.token, b.token);
        });
      });

      return {
        chests: chests,
        itemsByChest: itemsByChest,
        defaults: bootstrapData.defaults || {},
        lists: bootstrapData.lists || {},
        dataVersion: String(bootstrapData.data_version || "0")
      };
    }

    function applyServerDefaults(defaults) {
      const value = defaults && typeof defaults === "object" ? defaults : {};
      if (Array.isArray(value.default_status_filter)) {
        const normalized = value.default_status_filter.map(function (entry) {
          return normalizeServerStatus(entry);
        });
        const nextDefaults = STATUS_ORDER.filter(function (status) {
          return normalized.indexOf(status) !== -1;
        });
        if (nextDefaults.length) {
          defaultListStatusFilters = nextDefaults;
        }
      }
      if (typeof value.default_edit_first === "boolean") {
        isEditFirstMode = value.default_edit_first;
      }
    }

    function loadInitialStateFromDataSource() {
      const runner = getAppsScriptRunner();
      if (!runner) {
        if (isBootstrapping) {
          const elapsed = Date.now() - (bootstrapRunnerWaitStartedAt || Date.now());
          if (elapsed < BOOTSTRAP_RUNNER_MAX_WAIT_MS) {
            clearBootstrapRunnerWaitTimer();
            bootstrapRunnerWaitTimer = setTimeout(loadInitialStateFromDataSource, BOOTSTRAP_RUNNER_POLL_MS);
            return;
          }
          isBootstrapping = false;
          bootstrapInFlight = false;
          dataSourceMode = "local";
          sheetsModeEnabled = false;
          applyLocalSnapshotOrFallback({
            snapshot: sanitizeBootstrapFallbackSnapshot(initialLocalSnapshot),
            allowDummyFallback: false
          });
          initialLocalSnapshot = null;
          clearBootstrapRunnerWaitTimer();
          resetSyncRetryState();
          setSyncState("retry", "Unable to connect to data source.");
          renderAllPreservingScroll();
          return;
        }
        clearBootstrapRunnerWaitTimer();
        bootstrapInFlight = false;
        return;
      }

      clearBootstrapRunnerWaitTimer();
      if (bootstrapInFlight) return;
      bootstrapInFlight = true;
      const requestNonce = ++bootstrapRequestNonce;
      isBootstrapping = true;
      renderAllPreservingScroll();

      runner
        .withSuccessHandler(function (response) {
          if (requestNonce !== bootstrapRequestNonce) return;
          bootstrapInFlight = false;
          const envelope = unwrapServerEnvelope(response);
          if (!envelope.ok) {
            isBootstrapping = false;
            dataSourceMode = "local";
            sheetsModeEnabled = false;
            applyLocalSnapshotOrFallback({
              snapshot: sanitizeBootstrapFallbackSnapshot(initialLocalSnapshot),
              allowDummyFallback: false
            });
            initialLocalSnapshot = null;
            resetSyncRetryState();
            setSyncState("retry", envelope.error || "Bootstrap failed.");
            renderAllPreservingScroll();
            return;
          }

          const normalized = normalizeSheetsBootstrap(envelope.data || {});
          if (!normalized) {
            isBootstrapping = false;
            dataSourceMode = "local";
            sheetsModeEnabled = false;
            applyLocalSnapshotOrFallback({
              snapshot: sanitizeBootstrapFallbackSnapshot(initialLocalSnapshot),
              allowDummyFallback: false
            });
            initialLocalSnapshot = null;
            resetSyncRetryState();
            setSyncState("saved");
            renderAllPreservingScroll();
            return;
          }

          dataSourceMode = "sheets";
          sheetsModeEnabled = true;
          isBootstrapping = false;
          resetSyncRetryState();
          initialLocalSnapshot = null;
          clearLocalModeSnapshot();
          lastServerDataVersion = normalized.dataVersion || "0";
          applySnapshotToState({
            chests: normalized.chests,
            itemsByChest: normalized.itemsByChest
          });
          applyServerDefaults(normalized.defaults);
          applyStoredUiPreferences();
          applyUiPreferencesForChest(selectedChestId);
          maybeEnableUnusedFilterForSelectedChest();
          pendingDeleteChestId = "";
          pendingDeleteGroupPrefix = "";
          selectedItemId = "";
          setDetailEditMode(false);
          clearUndoHistoryState();
          setSyncState("saved");
          renderAllPreservingScroll();
        })
        .withFailureHandler(function (error) {
          if (requestNonce !== bootstrapRequestNonce) return;
          bootstrapInFlight = false;
          isBootstrapping = false;
          dataSourceMode = "local";
          sheetsModeEnabled = false;
          applyLocalSnapshotOrFallback({
            snapshot: sanitizeBootstrapFallbackSnapshot(initialLocalSnapshot),
            allowDummyFallback: false
          });
          initialLocalSnapshot = null;
          resetSyncRetryState();
          setSyncState("retry", getErrorMessage(error, "Bootstrap failed."));
          renderAllPreservingScroll();
        })
        .lootBootstrap();
    }

    function hasSelectedChest() {
      return !!(selectedChestId && workingItemsByChest[selectedChestId]);
    }

    function getWorkingItems(chestId) {
      if (!chestId) return [];
      if (!workingItemsByChest[chestId]) {
        workingItemsByChest[chestId] = [];
      }
      return workingItemsByChest[chestId];
    }

    function getActiveItems(chestId) {
      return getWorkingItems(chestId).filter(function (item) {
        return !item.deleted;
      });
    }

    function buildWorkingSnapshot() {
      return {
        chests: chestList,
        itemsByChest: workingItemsByChest
      };
    }

    function buildPersistedSnapshot() {
      return {
        chests: persistedChestList,
        itemsByChest: persistedItemsByChest
      };
    }

    function isDirty() {
      return JSON.stringify(buildWorkingSnapshot()) !== JSON.stringify(buildPersistedSnapshot());
    }

    function updateDirtyState() {
      const hasChest = chestList.length > 0;
      const dirty = hasChest && isDirty();
      if (syncStatusButtonNode) {
        syncStatusButtonNode.classList.remove("is-saved", "is-saving", "is-retry");
        if (isBootstrapping) {
          syncStatusButtonNode.textContent = "Loading...";
          syncStatusButtonNode.disabled = true;
          syncStatusButtonNode.title = "";
          syncStatusButtonNode.classList.add("is-saving");
        } else if (!hasChest) {
          syncStatusButtonNode.textContent = "Saved";
          syncStatusButtonNode.disabled = true;
          syncStatusButtonNode.title = "";
          syncStatusButtonNode.classList.add("is-saved");
        } else if (syncState === "retry") {
          syncStatusButtonNode.textContent = "Retry";
          syncStatusButtonNode.disabled = false;
          syncStatusButtonNode.title = syncErrorText || "Retry sync";
          syncStatusButtonNode.classList.add("is-retry");
        } else if (syncState === "saving") {
          syncStatusButtonNode.textContent = "Saving...";
          syncStatusButtonNode.disabled = true;
          syncStatusButtonNode.title = "";
          syncStatusButtonNode.classList.add("is-saving");
        } else if (dirty) {
          syncStatusButtonNode.textContent = "Saving...";
          syncStatusButtonNode.disabled = true;
          syncStatusButtonNode.title = "";
          syncStatusButtonNode.classList.add("is-saving");
        } else {
          syncStatusButtonNode.textContent = "Saved";
          syncStatusButtonNode.disabled = true;
          syncStatusButtonNode.title = "";
          syncStatusButtonNode.classList.add("is-saved");
        }
      }
      if (backupsButtonNode) backupsButtonNode.disabled = !hasChest || isBootstrapping;
    }

    function shouldShowDetailMetaTag(value) {
      const label = normalizeWhitespace(value);
      if (!label) return false;
      const collapsed = label.replace(/\s+/g, "").toLowerCase();
      if (collapsed === "--" || collapsed === "-" || collapsed === "n/a" || collapsed === "na") {
        return false;
      }
      return true;
    }

    function getVisibleItems() {
      const activeItems = getActiveItems(selectedChestId);
      const filtered = activeItems.filter(function (item) {
        const includeByStatus = activeListStatusFilters.has(item.status) || deferredHiddenItemIds.has(item.item_id);
        if (!includeByStatus) return false;
        if (!searchTerm) return true;
        const haystack = (item.token + " " + item.item_name).toLowerCase();
        return haystack.indexOf(searchTerm) !== -1;
      });

      filtered.sort(function (a, b) {
        return compareTokens(a.token, b.token);
      });

      return filtered;
    }

    function clearDeferredStatusState() {
      const hadDeferred = deferredHiddenItemIds.size > 0;
      const hadChanged = !!justChangedItemId;
      deferredHiddenItemIds.clear();
      justChangedItemId = "";
      return hadDeferred || hadChanged;
    }

    function markStatusJustChanged(item, status) {
      if (!item || !item.item_id) return;
      justChangedItemId = item.item_id;
      deferredHiddenItemIds.delete(item.item_id);
      if (!activeListStatusFilters.has(status)) {
        deferredHiddenItemIds.add(item.item_id);
      }
    }

    function clearDeferredStatusStateAfterInteraction(exemptItemId) {
      if (!deferredHiddenItemIds.size && !justChangedItemId) return;
      if (exemptItemId && justChangedItemId && exemptItemId === justChangedItemId) return;
      clearDeferredStatusState();
    }

    function clearSelectionStateForDeletedItems(deletedItemIds) {
      if (!deletedItemIds || !deletedItemIds.size) return false;

      let clearedSelected = false;
      if (selectedItemId && deletedItemIds.has(selectedItemId)) {
        selectedItemId = "";
        setDetailEditMode(false);
        detailDraftInitial = null;
        clearedSelected = true;
      }

      if (statusPopoverItemId && deletedItemIds.has(statusPopoverItemId)) {
        closeStatusPopover();
      }

      if (justChangedItemId && deletedItemIds.has(justChangedItemId)) {
        justChangedItemId = "";
      }

      deletedItemIds.forEach(function (itemId) {
        deferredHiddenItemIds.delete(itemId);
      });

      if (lastChangeState && lastChangeState.item_id && deletedItemIds.has(lastChangeState.item_id)) {
        clearUndoHistoryState();
      }

      return clearedSelected;
    }

    function pruneDeferredStatusState() {
      const activeIds = new Set(getActiveItems(selectedChestId).map(function (item) { return item.item_id; }));
      if (justChangedItemId && !activeIds.has(justChangedItemId)) {
        justChangedItemId = "";
      }
      if (deferredHiddenItemIds.size) {
        deferredHiddenItemIds.forEach(function (itemId) {
          if (!activeIds.has(itemId)) {
            deferredHiddenItemIds.delete(itemId);
          }
        });
      }
    }

    function getActiveFilterList() {
      return STATUS_ORDER.filter(function (status) {
        return activeListStatusFilters.has(status);
      });
    }

    function maybeEnableUnusedFilterForSelectedChest() {
      if (!selectedChestId) return false;
      const activeItems = getActiveItems(selectedChestId);
      if (!activeItems.length) return false;
      const counts = {
        IN_CHEST: 0,
        AWARDED: 0,
        UNUSED: 0
      };
      activeItems.forEach(function (item) {
        if (counts[item.status] !== undefined) {
          counts[item.status] += 1;
        }
      });
      if (counts.IN_CHEST === 0 && counts.AWARDED === 0 && counts.UNUSED > 0) {
        ensureListStatusFilter(STATUS.UNUSED, { persist: false });
        return true;
      }
      return false;
    }

    function setListStatusFilters(statuses, options) {
      const settings = options && typeof options === "object" ? options : {};
      const shouldPersist = settings.persist !== false;
      const next = new Set();
      (statuses || []).forEach(function (status) {
        if (STATUS_LABELS[status]) {
          next.add(status);
        }
      });
      activeListStatusFilters = next;
      if (shouldPersist) {
        persistUiPreferences();
      }
    }

    function ensureListStatusFilter(status, options) {
      const settings = options && typeof options === "object" ? options : {};
      const shouldPersist = settings.persist !== false;
      if (!STATUS_LABELS[status]) return;
      if (activeListStatusFilters.has(status)) return;
      const next = new Set(activeListStatusFilters);
      next.add(status);
      activeListStatusFilters = next;
      if (shouldPersist) {
        persistUiPreferences();
      }
    }

    function toggleListStatusFilter(status, options) {
      const settings = options && typeof options === "object" ? options : {};
      const shouldPersist = settings.persist !== false;
      if (!STATUS_LABELS[status]) return;
      const next = new Set(activeListStatusFilters);
      if (next.has(status)) {
        next.delete(status);
      } else {
        next.add(status);
      }
      activeListStatusFilters = next;
      if (shouldPersist) {
        persistUiPreferences();
      }
      renderAll();
    }

    function getItemById(itemId) {
      if (!itemId) return null;
      const activeItems = getActiveItems(selectedChestId);
      return activeItems.find(function (item) {
        return item.item_id === itemId;
      }) || null;
    }

    function isItemNameUnassigned(item) {
      if (!item) return true;
      return !normalizeWhitespace(item.item_name);
    }

    function ensureSelection() {
      if (!selectedItemId) return;
      if (!getItemById(selectedItemId)) {
        selectedItemId = "";
      }
    }

    function clearNode(node) {
      while (node.firstChild) {
        node.removeChild(node.firstChild);
      }
    }

    function updateMetrics() {
      const activeItems = getActiveItems(selectedChestId);
      const counts = {
        IN_CHEST: 0,
        AWARDED: 0,
        UNUSED: 0
      };
      activeItems.forEach(function (item) {
        if (counts[item.status] !== undefined) {
          counts[item.status] += 1;
        }
      });
      statusCounts = counts;
    }

    function buildTableRow(item) {
      const tr = document.createElement("tr");
      tr.className = "loot-v2-row " + getStatusClass(item.status);
      if (item.item_id === selectedItemId) {
        tr.classList.add("is-selected");
      }
      if (item.item_id === justChangedItemId) {
        tr.classList.add("is-just-changed");
      }
      tr.setAttribute("data-item-id", item.item_id);

      const tokenCell = document.createElement("td");
      tokenCell.className = "loot-v2-token-cell";
      const statusButton = document.createElement("button");
      statusButton.className = "loot-v2-token-status-trigger";
      if (item.item_id === justChangedItemId) {
        statusButton.classList.add("is-just-changed");
      }
      statusButton.type = "button";
      statusButton.setAttribute("data-action", "open-row-status");
      statusButton.setAttribute("data-item-id", item.item_id);
      statusButton.setAttribute("data-status", item.status || STATUS.UNUSED);
      statusButton.setAttribute("aria-label", "Set status: " + toDisplayStatus(item.status || STATUS.UNUSED));
      statusButton.setAttribute("title", "Set status");
      const statusGlyphNode = document.createElement("span");
      statusGlyphNode.className = "loot-v2-token-status-glyph loot-v2-item-status-" + getStatusClassSuffix(item.status);
      statusGlyphNode.textContent = getStatusGlyph(item.status);
      statusGlyphNode.setAttribute("aria-hidden", "true");
      const tokenNode = document.createElement("span");
      tokenNode.className = "loot-v2-token";
      tokenNode.textContent = item.token;
      statusButton.appendChild(statusGlyphNode);
      statusButton.appendChild(tokenNode);
      tokenCell.appendChild(statusButton);

      const nameCell = document.createElement("td");
      nameCell.className = "loot-v2-item-cell";
      const nameNode = document.createElement("div");
      nameNode.className = "loot-v2-item-name loot-v2-item-name-" + getStatusClassSuffix(item.status);
      if (!normalizeWhitespace(item.item_name)) {
        nameNode.classList.add("is-unassigned");
      }
      const textNode = document.createElement("span");
      textNode.className = "loot-v2-item-name-text";
      textNode.textContent = item.item_name || "(Unassigned)";
      nameNode.appendChild(textNode);
      nameCell.appendChild(nameNode);

      tr.appendChild(tokenCell);
      tr.appendChild(nameCell);
      return tr;
    }

    function getGroupLabel(item) {
      const categoryLabel = normalizeWhitespace(item && item.category_label ? item.category_label : "");
      if (categoryLabel) return categoryLabel;
      const parts = parseTokenParts(item && item.token ? item.token : "");
      return parts.prefix || "Misc";
    }

    function getGroupThemeValue(item, label) {
      const fromItem = resolveThemeValue(item && item.color_theme ? item.color_theme : "");
      if (fromItem) return fromItem;
      return resolveThemeValue(label);
    }

    function buildVisibleGroups(items) {
      const groups = [];
      let current = null;
      items.forEach(function (item) {
        const label = getGroupLabel(item);
        if (!current || current.label !== label) {
          current = {
            label: label,
            themeValue: getGroupThemeValue(item, label),
            items: []
          };
          groups.push(current);
        }
        if (!current.themeValue) {
          current.themeValue = getGroupThemeValue(item, label);
        }
        current.items.push(item);
      });
      return groups;
    }

    function splitGroupsAcrossColumns(groups) {
      const midpoint = Math.ceil(groups.length / 2);
      const columnA = groups.slice(0, midpoint);
      const columnB = groups.slice(midpoint);
      return [columnA, columnB];
    }

    function buildGroupCard(group) {
      const palette = getGroupPalette(group.themeValue || group.label);
      const card = document.createElement("section");
      card.className = "loot-v2-group-card";
      card.setAttribute("data-group-key", normalizePrefixKey(group.label));
      card.style.setProperty("--loot-group-header-bg", palette.headerBg);
      card.style.setProperty("--loot-group-header-text", palette.headerText);
      card.style.setProperty("--loot-group-row-odd", palette.rowOddBg);
      card.style.setProperty("--loot-group-row-even", palette.rowEvenBg);
      card.style.setProperty("--loot-group-edge", palette.edge);
      card.style.setProperty("--loot-group-label-text", palette.labelText);

      const title = document.createElement("div");
      title.className = "loot-v2-group-title";
      title.textContent = group.label;
      card.appendChild(title);

      const wrap = document.createElement("div");
      wrap.className = "loot-v2-list-wrap";
      const table = document.createElement("table");
      table.className = "loot-v2-table loot-v2-group-table";

      const thead = document.createElement("thead");
      const headerRow = document.createElement("tr");
      const tokenHeader = document.createElement("th");
      tokenHeader.className = "loot-v2-token-col-heading";
      tokenHeader.textContent = "Token";
      const itemHeader = document.createElement("th");
      itemHeader.className = "loot-v2-item-col-heading";
      itemHeader.textContent = "Item";
      headerRow.appendChild(tokenHeader);
      headerRow.appendChild(itemHeader);
      thead.appendChild(headerRow);

      const tbody = document.createElement("tbody");
      group.items.forEach(function (item) {
        tbody.appendChild(buildTableRow(item));
      });

      table.appendChild(thead);
      table.appendChild(tbody);
      wrap.appendChild(table);
      card.appendChild(wrap);
      return card;
    }

    function scrollGroupIntoView(groupName) {
      const key = normalizePrefixKey(groupName);
      if (!key) return;
      const tableScroll = document.getElementById("lootV2TableScroll");
      if (!tableScroll) return;
      const target = tableScroll.querySelector('.loot-v2-group-card[data-group-key="' + key + '"]');
      if (!target) return;
      const targetTop = target.offsetTop;
      const gap = 10;
      // Always top-anchor the group so token 1/header is visible after create/add flows.
      tableScroll.scrollTop = Math.max(0, targetTop - gap);
    }

    function getNotesFieldMinHeight() {
      if (!editNotesNode) return 36;
      const styles = window.getComputedStyle(editNotesNode);
      const lineHeight = parseFloat(styles.lineHeight) || 16.4;
      const paddingTop = parseFloat(styles.paddingTop) || 0;
      const paddingBottom = parseFloat(styles.paddingBottom) || 0;
      const borderTop = parseFloat(styles.borderTopWidth) || 0;
      const borderBottom = parseFloat(styles.borderBottomWidth) || 0;
      return Math.ceil(lineHeight + paddingTop + paddingBottom + borderTop + borderBottom);
    }

    function getDescriptionFieldMinHeight() {
      if (!editDescriptionNode) return 72;
      const styles = window.getComputedStyle(editDescriptionNode);
      const lineHeight = parseFloat(styles.lineHeight) || 16.4;
      const paddingTop = parseFloat(styles.paddingTop) || 0;
      const paddingBottom = parseFloat(styles.paddingBottom) || 0;
      const borderTop = parseFloat(styles.borderTopWidth) || 0;
      const borderBottom = parseFloat(styles.borderBottomWidth) || 0;
      return Math.ceil(lineHeight + paddingTop + paddingBottom + borderTop + borderBottom);
    }

    function setDescriptionFieldToMinHeight() {
      if (!editDescriptionNode) return;
      editDescriptionNode.style.height = getDescriptionFieldMinHeight() + "px";
    }

    function autoSizeDescriptionField() {
      if (!editDescriptionNode) return;
      const minHeight = getDescriptionFieldMinHeight();
      editDescriptionNode.style.height = minHeight + "px";
      const measured = editDescriptionNode.scrollHeight || 0;
      const nextHeight = Math.max(minHeight, Math.ceil(measured));
      editDescriptionNode.style.height = nextHeight + "px";
    }

    function setNotesFieldToMinHeight() {
      if (!editNotesNode) return;
      editNotesNode.style.height = getNotesFieldMinHeight() + "px";
    }

    function autoSizeNotesField() {
      if (!editNotesNode) return;
      const minHeight = getNotesFieldMinHeight();
      editNotesNode.style.height = minHeight + "px";
      if (!normalizeWhitespace(editNotesNode.value)) {
        return;
      }
      const measured = editNotesNode.scrollHeight || 0;
      const nextHeight = Math.max(minHeight, Math.ceil(measured));
      editNotesNode.style.height = nextHeight + "px";
    }

    function clearPendingDetailAutosize() {
      if (detailAutosizeRafA) {
        cancelAnimationFrame(detailAutosizeRafA);
        detailAutosizeRafA = 0;
      }
      if (detailAutosizeRafB) {
        cancelAnimationFrame(detailAutosizeRafB);
        detailAutosizeRafB = 0;
      }
      if (detailAutosizeTimer) {
        clearTimeout(detailAutosizeTimer);
        detailAutosizeTimer = null;
      }
    }

    function isDetailPanelVisibleForAutosize() {
      const panel = document.getElementById("lootV2DetailPanel");
      if (!panel || panel.hidden) return false;
      const rect = panel.getBoundingClientRect();
      return rect.width > 120 && rect.height > 120;
    }

    function scheduleDetailAutosize(expectedItemId) {
      clearPendingDetailAutosize();
      setDescriptionFieldToMinHeight();
      setNotesFieldToMinHeight();

      const runAutosize = function () {
        if (!isDetailEditing) return;
        if (expectedItemId && selectedItemId !== expectedItemId) return;
        if (!isDetailPanelVisibleForAutosize()) {
          setDescriptionFieldToMinHeight();
          setNotesFieldToMinHeight();
          return;
        }
        autoSizeDescriptionField();
        autoSizeNotesField();
      };

      detailAutosizeRafA = requestAnimationFrame(function () {
        detailAutosizeRafA = 0;
        detailAutosizeRafB = requestAnimationFrame(function () {
          detailAutosizeRafB = 0;
          runAutosize();
        });
      });
      detailAutosizeTimer = setTimeout(function () {
        detailAutosizeTimer = null;
        runAutosize();
      }, 120);
    }

    function renderEmptyColumn(columnNode, message) {
      clearNode(columnNode);
      if (!message) return;
      const wrap = document.createElement("div");
      wrap.className = "loot-v2-list-wrap";
      const table = document.createElement("table");
      table.className = "loot-v2-table";
      const tbody = document.createElement("tbody");
      const tr = document.createElement("tr");
      const td = document.createElement("td");
      td.className = "loot-v2-empty";
      td.colSpan = 2;
      td.textContent = message;
      tr.appendChild(td);
      tbody.appendChild(tr);
      table.appendChild(tbody);
      wrap.appendChild(table);
      columnNode.appendChild(wrap);
    }

    function setTableColumnsSplit(split) {
      if (!columnANode || !columnBNode) return;
      columnANode.classList.toggle("is-spanning", !split);
      columnBNode.hidden = !split;
    }

    function renderColumn(columnNode, groups, emptyMessage) {
      clearNode(columnNode);
      if (!groups.length) {
        renderEmptyColumn(columnNode, emptyMessage);
        return;
      }
      groups.forEach(function (group) {
        columnNode.appendChild(buildGroupCard(group));
      });
    }

    function renderTable() {
      if (isBootstrapping) {
        showStartupFloofLoading();
        setTableColumnsSplit(false);
        renderEmptyColumn(columnANode, "Searching for save data in Google Drive. Please wait...");
        return;
      }
      if (runStartupFloofSequenceIfNeeded()) {
        setTableColumnsSplit(false);
        renderEmptyColumn(columnANode, "");
        return;
      }
      hideStartupFloof();
      if (!hasSelectedChest()) {
        setTableColumnsSplit(false);
        renderEmptyColumn(columnANode, "Create a loot chest to begin.");
        return;
      }
      const activeItems = getActiveItems(selectedChestId);
      if (!activeItems.length) {
        setTableColumnsSplit(false);
        renderEmptyColumn(columnANode, "No tokens created. Create a Token Group to get started.");
        return;
      }
      if (activeListStatusFilters.size === 0) {
        setTableColumnsSplit(false);
        renderEmptyColumn(columnANode, "No filter selected.");
        return;
      }
      const visibleItems = getVisibleItems();
      if (!visibleItems.length) {
        setTableColumnsSplit(false);
        renderEmptyColumn(columnANode, "No tokens match this view.");
        return;
      }

      setTableColumnsSplit(true);
      const groups = buildVisibleGroups(visibleItems);
      const columns = splitGroupsAcrossColumns(groups);
      renderColumn(columnANode, columns[0], "No tokens.");
      renderColumn(columnBNode, columns[1], "");
    }

    function toSafeExternalHref(rawUrl) {
      const value = normalizeWhitespace(rawUrl);
      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return value;
      if (/^[a-z][a-z0-9+.-]*:/i.test(value)) return "";
      return "https://" + value;
    }

    function renderItemUrlView(item) {
      if (!itemUrlViewNode || !itemUrlAnchorNode) return;
      if (itemUrlEditFieldNode) {
        itemUrlEditFieldNode.hidden = !isDetailEditing;
      }
      if (isDetailEditing || !item) {
        itemUrlViewNode.hidden = true;
        itemUrlAnchorNode.removeAttribute("href");
        itemUrlAnchorNode.textContent = "";
        return;
      }
      const safeHref = toSafeExternalHref(item.item_url || "");
      if (!safeHref) {
        itemUrlViewNode.hidden = true;
        itemUrlAnchorNode.removeAttribute("href");
        itemUrlAnchorNode.textContent = "";
        return;
      }
      itemUrlViewNode.hidden = false;
      itemUrlAnchorNode.href = safeHref;
      itemUrlAnchorNode.textContent = item.item_url;
    }

    function renderDetailStatusChip(item) {
      if (!detailStatusChipNode || !detailStatusGlyphNode || !detailStatusLabelNode) return;
      if (!item) {
        detailStatusChipNode.hidden = true;
        detailStatusChipNode.removeAttribute("data-item-id");
        detailStatusChipNode.removeAttribute("data-status");
        detailStatusChipNode.setAttribute("aria-label", "Set status");
        detailStatusGlyphNode.textContent = getStatusGlyph(STATUS.UNUSED);
        detailStatusGlyphNode.className = "loot-v2-detail-status-chip-glyph loot-v2-item-status-unused";
        detailStatusLabelNode.textContent = "Status";
        return;
      }

      const status = item.status || STATUS.UNUSED;
      detailStatusChipNode.hidden = false;
      detailStatusChipNode.setAttribute("data-item-id", item.item_id);
      detailStatusChipNode.setAttribute("data-status", status);
      detailStatusChipNode.setAttribute("aria-label", "Set status: " + toDisplayStatus(status));
      detailStatusGlyphNode.textContent = getStatusGlyph(status);
      detailStatusGlyphNode.className = "loot-v2-detail-status-chip-glyph loot-v2-item-status-" + getStatusClassSuffix(status);
      detailStatusLabelNode.textContent = toDisplayStatus(status);
    }

    function clearDetailFloofPreviewAnimation() {
      if (detailFloofPreviewTimer) {
        clearTimeout(detailFloofPreviewTimer);
        detailFloofPreviewTimer = null;
      }
      detailFloofPreviewTransitionTargetStatus = "";
      if (detailFloofPreviewNode) {
        detailFloofPreviewNode.classList.remove("is-playing");
        detailFloofPreviewNode.classList.remove("is-idle-hop");
        detailFloofPreviewNode.classList.remove("is-loading-loop");
        detailFloofPreviewNode.classList.remove("is-reveal-fast");
        detailFloofPreviewNode.classList.remove("is-dismiss-fast");
        detailFloofPreviewNode.classList.remove("is-transition-open");
        detailFloofPreviewNode.classList.remove("is-transition-smoke");
      }
    }

    function setDetailFloofPreviewStatic(status) {
      if (!detailFloofPreviewNode) return;
      clearDetailFloofPreviewAnimation();
      if (status === STATUS.UNUSED) {
        detailFloofPreviewNode.hidden = true;
        detailFloofPreviewStatus = STATUS.UNUSED;
        return;
      }
      detailFloofPreviewNode.hidden = false;
      if (status === STATUS.IN_CHEST) {
        detailFloofPreviewNode.classList.add("is-loading-loop");
      } else {
        detailFloofPreviewNode.classList.add("is-idle-hop");
      }
      detailFloofPreviewStatus = status;
    }

    function playDetailFloofTransition(previousStatus, nextStatus) {
      if (!detailFloofPreviewNode) return;
      const transitionMs = nextStatus === STATUS.IN_CHEST
        ? DETAIL_FLOOF_TO_CHEST_MS
        : DETAIL_FLOOF_TRANSITION_MS;
      clearDetailFloofPreviewAnimation();
      void detailFloofPreviewNode.offsetWidth;
      detailFloofPreviewNode.hidden = false;
      detailFloofPreviewTransitionTargetStatus = nextStatus;

      if (nextStatus === STATUS.AWARDED) {
        detailFloofPreviewNode.classList.add("is-transition-open");
      } else if (nextStatus === STATUS.IN_CHEST && previousStatus === STATUS.AWARDED) {
        detailFloofPreviewNode.classList.add("is-dismiss-fast");
      } else {
        detailFloofPreviewNode.classList.add("is-transition-smoke");
      }

      detailFloofPreviewTimer = setTimeout(function () {
        if (detailFloofPreviewTransitionTargetStatus !== nextStatus) {
          detailFloofPreviewTimer = null;
          return;
        }
        detailFloofPreviewTransitionTargetStatus = "";
        detailFloofPreviewStatus = nextStatus;
        setDetailFloofPreviewStatic(nextStatus);
        detailFloofPreviewTimer = null;
      }, transitionMs);
    }

    function renderDetailFloofPreview(item) {
      if (!detailFloofPreviewNode) return;
      const nextItemId = item && item.item_id ? item.item_id : "";
      const nextStatus = item ? (item.status || STATUS.UNUSED) : STATUS.UNUSED;

      if (!nextItemId) {
        detailFloofPreviewItemId = "";
        detailFloofPreviewStatus = "";
        clearDetailFloofPreviewAnimation();
        detailFloofPreviewNode.hidden = true;
        return;
      }

      if (
        detailFloofPreviewTimer &&
        detailFloofPreviewItemId === nextItemId &&
        detailFloofPreviewTransitionTargetStatus === nextStatus
      ) {
        return;
      }

      const isSameItem = detailFloofPreviewItemId === nextItemId;
      const previousStatus = detailFloofPreviewStatus;
      detailFloofPreviewItemId = nextItemId;

      if (isSameItem && previousStatus && previousStatus !== nextStatus) {
        detailFloofPreviewStatus = nextStatus;
        playDetailFloofTransition(previousStatus, nextStatus);
        return;
      }

      if (!isSameItem || previousStatus !== nextStatus) {
        setDetailFloofPreviewStatic(nextStatus);
        return;
      }
    }

    function clearStartupFloofTimer() {
      if (startupFloofTimer) {
        clearTimeout(startupFloofTimer);
        startupFloofTimer = null;
      }
    }

    function setStartupFloofCaption(text) {
      if (!startupFloofCaptionNode) return;
      startupFloofCaptionNode.textContent = text;
    }

    function setStartupFloofCaptionVisible(visible) {
      if (!startupFloofCaptionNode) return;
      startupFloofCaptionNode.hidden = !visible;
    }

    function clearStartupFloofClasses() {
      if (!startupFloofPreviewNode) return;
      startupFloofPreviewNode.classList.remove("is-loading-loop");
      startupFloofPreviewNode.classList.remove("is-playing");
      startupFloofPreviewNode.classList.remove("is-idle-hop");
      startupFloofPreviewNode.classList.remove("is-reveal-fast");
      startupFloofPreviewNode.classList.remove("is-dismiss-fast");
    }

    function hideStartupFloof() {
      clearStartupFloofTimer();
      startupFloofRevealInProgress = false;
      startupFloofAwaitingDismiss = false;
      startupFloofDismissInProgress = false;
      if (tableScrollNode) {
        tableScrollNode.classList.remove("is-startup-loading");
      }
      if (!startupFloofPreviewNode) return;
      clearStartupFloofClasses();
      setStartupFloofCaptionVisible(true);
      startupFloofPreviewNode.hidden = true;
    }

    function showStartupFloofLoading() {
      if (!startupFloofPreviewNode || !tableScrollNode) return;
      clearStartupFloofTimer();
      startupFloofRevealInProgress = false;
      startupFloofAwaitingDismiss = false;
      startupFloofDismissInProgress = false;
      setStartupFloofCaption("Searching for save data in Google Drive. Please wait...");
      setStartupFloofCaptionVisible(true);
      tableScrollNode.classList.add("is-startup-loading");
      startupFloofPreviewNode.hidden = false;
      clearStartupFloofClasses();
      startupFloofPreviewNode.classList.add("is-loading-loop");
    }

    function beginStartupFloofDismissIfNeeded() {
      if (!startupFloofAwaitingDismiss) return false;
      if (startupFloofDismissInProgress) return false;
      if (!startupFloofPreviewNode) {
        startupFloofComplete = true;
        return false;
      }

      startupFloofAwaitingDismiss = false;
      startupFloofDismissInProgress = true;
      clearStartupFloofTimer();
      setStartupFloofCaptionVisible(false);
      clearStartupFloofClasses();
      void startupFloofPreviewNode.offsetWidth;
      startupFloofPreviewNode.classList.add("is-dismiss-fast");

      startupFloofTimer = setTimeout(function () {
        startupFloofTimer = null;
        startupFloofDismissInProgress = false;
        startupFloofComplete = true;
        hideStartupFloof();
        renderAllPreservingScroll();
      }, STARTUP_FLOOF_DISMISS_MS);

      return true;
    }

    function runStartupFloofSequenceIfNeeded() {
      if (startupFloofComplete) return false;
      if (startupFloofRevealInProgress || startupFloofAwaitingDismiss || startupFloofDismissInProgress) {
        return true;
      }
      if (!startupFloofPreviewNode || !tableScrollNode) {
        startupFloofComplete = true;
        return false;
      }

      startupFloofRevealInProgress = true;
      clearStartupFloofTimer();
      setStartupFloofCaptionVisible(false);
      tableScrollNode.classList.add("is-startup-loading");
      startupFloofPreviewNode.hidden = false;
      clearStartupFloofClasses();
      void startupFloofPreviewNode.offsetWidth;
      startupFloofPreviewNode.classList.add("is-reveal-fast");

      startupFloofTimer = setTimeout(function () {
        startupFloofTimer = null;
        startupFloofRevealInProgress = false;
        startupFloofAwaitingDismiss = true;
        clearStartupFloofClasses();
        startupFloofPreviewNode.classList.add("is-idle-hop");
        setStartupFloofCaption("Floof demands attention before you start!");
        setStartupFloofCaptionVisible(true);
      }, STARTUP_FLOOF_REVEAL_MS);

      return true;
    }

    function showDetail(item) {
      if (!item) {
        detailEmptyNode.hidden = false;
        detailContentNode.hidden = true;
        setDetailEditMode(false);
        if (detailHeaderTitleNode) {
          detailHeaderTitleNode.textContent = "Item Details";
        }
        updateDetailHeaderButtons(null);
        if (detailItemNameReadNode) {
          detailItemNameReadNode.textContent = "";
          detailItemNameReadNode.classList.remove("is-empty");
        }
        if (detailRarityTagNode) {
          detailRarityTagNode.textContent = "";
          detailRarityTagNode.hidden = true;
        }
        if (detailTypeTagNode) {
          detailTypeTagNode.textContent = "";
          detailTypeTagNode.hidden = true;
        }
        renderDetailStatusChip(null);
        renderItemUrlView(null);
        if (descriptionReadNode) {
          descriptionReadNode.textContent = "Short item summary for table play";
          descriptionReadNode.classList.add("is-empty");
        }
        if (notesReadNode) {
          notesReadNode.textContent = "Optional DM notes";
          notesReadNode.classList.add("is-empty");
        }
        renderDetailFloofPreview(null);
        return;
      }

      detailEmptyNode.hidden = true;
      detailContentNode.hidden = false;
      if (detailHeaderTitleNode) {
        detailHeaderTitleNode.textContent = item.token;
      }
      updateDetailHeaderButtons(item);
      if (detailItemNameReadNode) {
        const itemName = normalizeWhitespace(item.item_name);
        detailItemNameReadNode.textContent = itemName || "(Unassigned item)";
        detailItemNameReadNode.classList.toggle("is-empty", !itemName);
      }
      if (detailRarityTagNode) {
        const rarityLabel = normalizeWhitespace(item.rarity);
        const showRarityTag = shouldShowDetailMetaTag(rarityLabel);
        detailRarityTagNode.textContent = showRarityTag ? rarityLabel : "";
        detailRarityTagNode.hidden = !showRarityTag;
      }
      if (detailTypeTagNode) {
        const typeLabel = normalizeWhitespace(item.type);
        const showTypeTag = shouldShowDetailMetaTag(typeLabel);
        detailTypeTagNode.textContent = showTypeTag ? typeLabel : "";
        detailTypeTagNode.hidden = !showTypeTag;
      }
      renderDetailStatusChip(item);
      const shouldHydrateEditFields =
        !isDetailEditing ||
        !detailDraftItemId ||
        detailDraftItemId !== item.item_id;
      if (shouldHydrateEditFields) {
        editItemNameNode.value = item.item_name || "";
        editRarityNode.value = item.rarity || "";
        editTypeNode.value = item.type || "";
        editDescriptionNode.value = item.description || "";
        editItemUrlNode.value = item.item_url || "";
        editNotesNode.value = item.notes || "";
        if (isDetailEditing) {
          detailDraftItemId = item.item_id;
          detailDraftInitial = snapshotEditableFields(item);
        }
      }
      if (descriptionReadNode) {
        const descriptionText = item.description || "";
        descriptionReadNode.textContent = descriptionText || "Short item summary for table play";
        descriptionReadNode.classList.toggle("is-empty", !normalizeWhitespace(descriptionText));
      }
      if (isDetailEditing) {
        scheduleDetailAutosize(item.item_id);
      } else {
        clearPendingDetailAutosize();
        setDescriptionFieldToMinHeight();
        setNotesFieldToMinHeight();
      }
      if (notesReadNode) {
        const notesText = item.notes || "";
        notesReadNode.textContent = notesText || "Optional DM notes";
        notesReadNode.classList.toggle("is-empty", !normalizeWhitespace(notesText));
      }
      renderItemUrlView(item);
      renderDetailFloofPreview(item);
    }

    function setDetailFieldDisabled(disabled) {
      [editItemNameNode, editRarityNode, editTypeNode, editDescriptionNode, editItemUrlNode, editNotesNode]
        .forEach(function (field) {
          field.disabled = !!disabled;
        });
    }

    function updateDetailHeaderButtons(item) {
      const hasItem = !!item;
      if (detailCopyButtonNode) {
        if (isDetailEditing) {
          detailCopyButtonNode.textContent = "Paste Item";
          detailCopyButtonNode.setAttribute("data-action", "paste-item");
          detailCopyButtonNode.disabled = !hasItem || !itemClipboardSnapshot;
          detailCopyButtonNode.title = !itemClipboardSnapshot ? "Copy an item first" : "Paste copied item details";
        } else {
          detailCopyButtonNode.textContent = "Copy Item";
          detailCopyButtonNode.setAttribute("data-action", "copy-item");
          detailCopyButtonNode.disabled = !hasItem;
          detailCopyButtonNode.title = hasItem ? "Copy this item's details" : "";
        }
      }
      if (detailEditButtonNode) {
        detailEditButtonNode.textContent = isDetailEditing ? "Cancel" : "Edit Item";
        detailEditButtonNode.setAttribute("data-action", "toggle-detail-edit");
        detailEditButtonNode.disabled = !hasItem;
        detailEditButtonNode.title = hasItem ? (isDetailEditing ? "Cancel editing" : "Edit this item") : "";
      }
    }

    function copySelectedItemDetails() {
      const item = getItemById(selectedItemId);
      if (!item) return false;
      let snapshot = snapshotEditableFields(item);
      if (isDetailEditing && detailDraftItemId === item.item_id) {
        snapshot = getDraftSnapshotFromFields() || snapshot;
      }
      if (!snapshot) return false;
      itemClipboardSnapshot = deepClone(snapshot);
      updateDetailHeaderButtons(item);
      return true;
    }

    function pasteClipboardIntoSelectedItemDraft() {
      if (!isDetailEditing || !itemClipboardSnapshot) return false;
      const item = getItemById(selectedItemId);
      if (!item) return false;
      const snapshot = deepClone(itemClipboardSnapshot);
      editItemNameNode.value = snapshot.item_name || "";
      editRarityNode.value = snapshot.rarity || "";
      editTypeNode.value = snapshot.type || "";
      editDescriptionNode.value = snapshot.description || "";
      editItemUrlNode.value = snapshot.item_url || "";
      editNotesNode.value = snapshot.notes || "";
      scheduleDetailAutosize(item.item_id);
      return true;
    }

    function clearDetailActionFeedback() {
      if (detailActionFeedbackHideTimer) {
        clearTimeout(detailActionFeedbackHideTimer);
        detailActionFeedbackHideTimer = null;
      }
      if (detailActionFeedbackNode && detailActionFeedbackNode.parentNode) {
        detailActionFeedbackNode.parentNode.removeChild(detailActionFeedbackNode);
      }
      detailActionFeedbackNode = null;
    }

    function showDetailActionFeedback(message, tone) {
      if (!message) return;
      const anchor = detailCopyButtonNode || detailEditButtonNode;
      if (!anchor || !document.body) return;
      clearDetailActionFeedback();

      const rect = anchor.getBoundingClientRect();
      if (!rect || !rect.width || !rect.height) return;

      const node = document.createElement("div");
      node.className = "loot-v2-detail-action-feedback";
      node.textContent = message;
      if (tone === "paste") node.classList.add("is-paste");
      if (tone === "copy") node.classList.add("is-copy");

      node.style.left = (rect.left + (rect.width / 2)) + "px";
      node.style.top = (rect.top - 6) + "px";

      document.body.appendChild(node);
      detailActionFeedbackNode = node;

      requestAnimationFrame(function () {
        if (detailActionFeedbackNode === node) {
          node.classList.add("is-visible");
        }
      });

      detailActionFeedbackHideTimer = setTimeout(function () {
        if (!detailActionFeedbackNode || detailActionFeedbackNode !== node) return;
        node.classList.remove("is-visible");
        setTimeout(function () {
          if (detailActionFeedbackNode === node) {
            clearDetailActionFeedback();
          }
        }, 160);
      }, 880);
    }

    function setDetailEditMode(editing) {
      isDetailEditing = !!editing;
      root.classList.toggle("loot-v2-detail-editing", isDetailEditing);
      setDetailFieldDisabled(!isDetailEditing);
      updateDetailHeaderButtons(getItemById(selectedItemId));
      if (isDetailEditing) {
        const selectedItem = getItemById(selectedItemId);
        detailDraftItemId = selectedItem ? selectedItem.item_id : "";
        if (selectedItem) {
          editItemNameNode.value = selectedItem.item_name || "";
          editRarityNode.value = selectedItem.rarity || "";
          editTypeNode.value = selectedItem.type || "";
          editDescriptionNode.value = selectedItem.description || "";
          editItemUrlNode.value = selectedItem.item_url || "";
          editNotesNode.value = selectedItem.notes || "";
        }
        detailDraftInitial = selectedItem ? snapshotEditableFields(selectedItem) : null;
        scheduleDetailAutosize(detailDraftItemId || selectedItemId);
      } else {
        clearPendingDetailAutosize();
        detailDraftInitial = null;
        detailDraftItemId = "";
        setDescriptionFieldToMinHeight();
        setNotesFieldToMinHeight();
      }
      renderItemUrlView(getItemById(selectedItemId));
    }

    function shouldAutoFocusItemName() {
      try {
        if (window.matchMedia && window.matchMedia("(any-pointer: coarse)").matches) {
          return false;
        }
      } catch (error) {
        // Ignore matchMedia errors and continue with fallback.
      }
      return true;
    }

    function focusItemNameForAutoEdit(expectedItemId) {
      if (!editItemNameNode) return;
      if (!shouldAutoFocusItemName()) return;
      const targetItemId = expectedItemId || selectedItemId;
      requestAnimationFrame(function () {
        if (!isDetailEditing || !editItemNameNode) return;
        if (targetItemId && selectedItemId !== targetItemId) return;
        try {
          editItemNameNode.focus({ preventScroll: true });
        } catch (error) {
          editItemNameNode.focus();
        }
        const length = (editItemNameNode.value || "").length;
        if (typeof editItemNameNode.setSelectionRange === "function") {
          editItemNameNode.setSelectionRange(length, length);
        }
      });
    }

    function clearSelectedItem(options) {
      if (!selectedItemId) return;
      const preserveDeferredStatus = !!(options && options.preserveDeferredStatus);
      const shouldRestoreDeferred =
        preserveDeferredStatus && (deferredHiddenItemIds.size > 0 || !!justChangedItemId);
      const deferredSnapshot = shouldRestoreDeferred ? new Set(deferredHiddenItemIds) : null;
      const justChangedSnapshot = shouldRestoreDeferred ? justChangedItemId : "";
      const scrollState = shouldRestoreDeferred ? captureScrollState() : null;
      selectedItemId = "";
      setDetailEditMode(false);
      closeStatusPopover();
      renderAll();
      if (shouldRestoreDeferred) {
        deferredHiddenItemIds = deferredSnapshot;
        justChangedItemId = justChangedSnapshot;
        renderAllPreservingScroll(scrollState);
      }
    }

    function renderDetail() {
      showDetail(getItemById(selectedItemId));
    }

    function renderManageTabState() {
      if (!manageTabButtonNodes || !managePanelNodes) return;
      const noChest = !hasSelectedChest();
      const hasGroups = getGroupSummaries().length > 0;
      if (!noChest && activeManageTab === "group-manage" && !hasGroups) {
        activeManageTab = "group-create";
      }
      manageTabButtonNodes.forEach(function (button) {
        const tab = button.getAttribute("data-manage-tab");
        const disabled = (noChest && tab !== "chest") || (!noChest && tab === "group-manage" && !hasGroups);
        button.disabled = disabled || isBootstrapping;
        button.classList.toggle("is-active", tab === activeManageTab);
      });
      managePanelNodes.forEach(function (panel) {
        const tab = panel.getAttribute("data-manage-panel");
        const isActive = tab === activeManageTab;
        panel.hidden = !isActive;
        panel.classList.toggle("is-active", isActive);
      });
    }

    function setManageTab(nextTab) {
      const tab = normalizeWhitespace(nextTab).toLowerCase();
      const valid = ["chest", "group-create", "group-manage", "tokens"];
      if (valid.indexOf(tab) === -1) return;
      activeManageTab = tab;
      renderManageTabState();
    }

    function renderUndoActionState() {
      if (!undoLastButtonNode) return;
      if (isBootstrapping || !hasSelectedChest()) {
        undoLastButtonNode.textContent = "Undo";
        undoLastButtonNode.disabled = true;
        return;
      }
      if (!lastChangeState || !lastChangeState.can_toggle) {
        undoLastButtonNode.textContent = "Undo";
        undoLastButtonNode.disabled = true;
        return;
      }
      undoLastButtonNode.disabled = false;
      undoLastButtonNode.textContent = lastChangeState.mode === "redo" ? "Redo" : "Undo";
    }

    function renderChestSelect() {
      const current = selectedChestId || chestSelectNode.value || CREATE_CHEST_OPTION;
      clearNode(chestSelectNode);
      chestList.forEach(function (chest) {
        const option = document.createElement("option");
        option.value = chest.chest_id;
        option.textContent = chest.chest_name;
        option.style.fontWeight = "700";
        chestSelectNode.appendChild(option);
      });
      const createOption = document.createElement("option");
      createOption.value = CREATE_CHEST_OPTION;
      createOption.textContent = "Create New Chest...";
      createOption.style.fontWeight = "700";
      chestSelectNode.appendChild(createOption);

      const hasCurrentChest = chestList.some(function (chest) {
        return chest.chest_id === current;
      });
      if (hasCurrentChest) {
        chestSelectNode.value = current;
      } else if (selectedChestId) {
        chestSelectNode.value = selectedChestId;
      } else {
        chestSelectNode.value = CREATE_CHEST_OPTION;
      }
      chestSelectNode.disabled = isBootstrapping;
    }

    function renderDeleteChestSelect() {
      if (!deleteChestSelectNode) return;
      const previous = deleteChestSelectNode.value;
      clearNode(deleteChestSelectNode);

      if (!chestList.length) {
        const empty = document.createElement("option");
        empty.value = "";
        empty.textContent = "No chest available";
        deleteChestSelectNode.appendChild(empty);
        deleteChestSelectNode.value = "";
        deleteChestSelectNode.disabled = true;
        if (deleteChestButtonNode) {
          deleteChestButtonNode.disabled = true;
          deleteChestButtonNode.textContent = "Delete Chest";
          deleteChestButtonNode.title = "Select chest";
        }
        pendingDeleteChestId = "";
        return;
      }

      const prompt = document.createElement("option");
